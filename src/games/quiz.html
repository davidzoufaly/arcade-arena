<!-- src/games/quiz.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade Arena — Pub Quiz</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <script>(function(){try{var t=localStorage.getItem('ps-theme')||(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="../shared/topbar.css">
<style>
  :root {
    --bg: #09090C; --bg-2: #18181B; --card: #222224;
    --text: #FFFFFF; --muted: #848486;
    --accent: #DAFE85; --accent-2: #657BC7; --good: #00e676; --bad: #ff4d6d; --gold: #ffd84d;
    --btn-on-accent: #09090C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, var(--bg-2) 0%, var(--bg) 60%);
    color: var(--text); min-height: 100vh;
  }
  main { max-width: 720px; margin: 0 auto; padding: 40px; }
  .head { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .head .emoji { font-size: 48px; }
  .head .icon { width: 72px; height: 72px; object-fit: cover; border-radius: 16px; flex: none; }
  h1 { font-size: 32px; font-weight: 900; letter-spacing: -1px; }
  .rules {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px; margin-bottom: 24px;
    line-height: 1.65; color: var(--text); font-size: 16px;
  }
  .rules p { margin-bottom: 10px; }
  .rules ul { margin: 6px 0 6px 22px; }
  .progress { color: var(--muted); font-size: 13px; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
  .panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px;
  }
  .panel h2 { font-size: 22px; margin-bottom: 16px; }
  .q { margin-bottom: 14px; }
  .q label { display: block; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 6px; }
  .q input[type=text] {
    background: var(--bg-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; font-size: 17px; font-family: inherit; width: 100%;
  }
  .q.bonus label { color: var(--gold); }
  .q.bonus input[type=text] { border-color: var(--gold); }
  .panel button {
    background: linear-gradient(135deg, var(--accent), #657BC7);
    border: none; color: var(--btn-on-accent); font-weight: 800; font-size: 17px;
    padding: 12px 18px; border-radius: 10px; cursor: pointer; font-family: inherit;
  }
  .panel button:disabled { opacity: 0.5; cursor: default; }
  .panel + .panel { margin-top: 16px; }
  .panel.done { opacity: 0.85; }
  .panel .progress { margin-bottom: 12px; }
  .cat-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .cat-head h2 { margin-bottom: 0; }
  .cat-badge { font-size: 13px; font-weight: 800; color: var(--good); background: rgba(0,230,118,0.12); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
  .q input[type=text]:disabled { opacity: 0.7; cursor: default; }
  .panel .current { color: var(--muted); font-size: 15px; margin-bottom: 10px; }
  .panel .current strong { color: var(--good); }
  .banner { margin-top: 12px; padding: 10px 14px; border-radius: 10px; font-size: 15px; font-weight: 700; }
  .banner.ok  { background: rgba(0,230,118,0.12); color: var(--good); }
  .banner.bad { background: rgba(255,77,109,0.12); color: var(--bad); }
</style>
</head>
<body>
<main>
  <div id="container">Loading…</div>
</main>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
import { getDatabase, ref, get, set, onValue } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js';
import { firebaseConfig } from '../firebase-config.js';
import { resolveSession } from '../shared/lobby.js';
import { isGameLockedFor, renderLockedScreen } from '../shared/game-gate.js';
import { mountTopbar } from '../shared/topbar.js';
import { getGame } from '../shared/games-catalog.js';
import { resolveRule } from '../shared/game-config.js';
import { orderedCategories, currentCategoryId } from '../shared/quiz.js';

const KEY = 'PQ';
const session = resolveSession();
if (!session) { location.replace('../index.html'); throw new Error('no session'); }
mountTopbar({ activePage: 'games' });

const game = getGame(KEY);
const container = document.getElementById('container');
const catalogHref = `../games.html?lobby=${encodeURIComponent(session.lobbyId)}&team=${session.teamId}`;

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderRules(text) {
  const blocks = String(text || '').split(/\n\s*\n/);
  return blocks.map(b => {
    const lines = b.split('\n');
    if (lines.every(l => l.startsWith('- '))) {
      return `<ul>${lines.map(l => `<li>${esc(l.slice(2))}</li>`).join('')}</ul>`;
    }
    return `<p>${esc(b.replace(/\n/g, ' '))}</p>`;
  }).join('');
}

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const LOBBY = `lobbies/${session.lobbyId}`;
const subsPath  = `${LOBBY}/quiz/submissions/${session.teamId}`;

// live state
let categories = null;
let catsLoaded = false;
let submissions = null;
let currentRules = null;
let renderedActiveCatId = null;  // active category in the last render — gates draft restore

function rulesText() {
  return resolveRule(currentRules, KEY, session.teamId, game.rules);
}

function shell(inner) {
  return `
    <div class="head">${game.icon ? `<img class="icon" src="${game.icon}" alt="${esc(game.name)}">` : `<div class="emoji">${game.emoji}</div>`}<h1>${esc(game.name)}</h1></div>
    <div class="rules">${renderRules(rulesText())}</div>
    ${inner}`;
}

function render() {
  if (!catsLoaded) return; // keep "Loading…" until first categories snapshot
  const ordered = orderedCategories(categories);
  if (ordered.length === 0) {
    container.innerHTML = shell(`<div class="panel"><h2>Quiz not ready</h2><p class="current">The host hasn't set up any categories yet. Check back soon.</p></div>`);
    return;
  }
  // Stack every already-submitted category (locked, answers shown) and, below
  // them, the one currently being answered. Future categories stay hidden until
  // reached. When all are submitted, append the "awaiting host" note.
  // Preserve any in-progress answers across a live re-render (e.g. the host
  // edits categories) so a teammate who is mid-typing doesn't lose their input.
  // Only restore when the active category is unchanged from the last render.
  const liveDraft = {};
  container.querySelectorAll('input[id]:not([disabled])').forEach(el => { liveDraft[el.id] = el.value; });

  const curId = currentCategoryId(categories, submissions);
  let activeCat = null;
  let panels = '';
  for (let pos = 0; pos < ordered.length; pos++) {
    const cat = ordered[pos];
    const sub = (submissions || {})[cat.id];
    if (sub) { panels += submittedPanel(cat, sub, pos + 1, ordered.length); continue; }
    if (cat.id === curId) {
      activeCat = cat;
      const prefill = cat.id === renderedActiveCatId ? liveDraft : {};
      panels += activePanel(cat, pos + 1, ordered.length, prefill);
    }
    break; // never render past the current category
  }
  if (curId === null) {
    panels += `<div class="panel done">
      <div class="progress">All ${ordered.length} categories completed</div>
      <p class="current">You're done — the host will mark your answers and tally your score. Nothing more to do here.</p>
    </div>`;
  }
  container.innerHTML = shell(`${panels}`);
  renderedActiveCatId = activeCat ? activeCat.id : null;
  if (activeCat) document.getElementById('submitCat').addEventListener('click', () => submitCategory(activeCat));
}

// A locked, read-only panel for a category the team already submitted.
function submittedPanel(cat, sub, pos, total) {
  const n = cat.questionCount || 0;
  let qs = '';
  for (let i = 0; i < n; i++) {
    const a = sub.answers?.[i] ?? '';
    qs += `<div class="q"><label>Question ${i + 1}</label><input type="text" value="${esc(a)}" disabled /></div>`;
    if (cat.bonus?.[i]) {
      const b = sub.bonusAnswers?.[i] ?? '';
      qs += `<div class="q bonus"><label>Question ${i + 1} — Bonus</label><input type="text" value="${esc(b)}" disabled /></div>`;
    }
  }
  return `<div class="panel done">
    <div class="progress">Category ${pos} of ${total}</div>
    <div class="cat-head"><h2>${esc(cat.name)}</h2><span class="cat-badge">✓ Completed</span></div>
    ${qs}
  </div>`;
}

// The editable panel for the category the team is currently answering.
function activePanel(cat, pos, total, prefill = {}) {
  const n = cat.questionCount || 0;
  let qs = '';
  for (let i = 0; i < n; i++) {
    qs += `<div class="q"><label for="q${i}">Question ${i + 1}</label><input id="q${i}" type="text" autocomplete="off" value="${esc(prefill[`q${i}`] ?? '')}" /></div>`;
    if (cat.bonus?.[i]) {
      qs += `<div class="q bonus"><label for="qb${i}">Question ${i + 1} — Bonus</label><input id="qb${i}" type="text" autocomplete="off" value="${esc(prefill[`qb${i}`] ?? '')}" /></div>`;
    }
  }
  return `<div class="panel">
    <div class="progress">Category ${pos} of ${total}</div>
    <h2>${esc(cat.name)}</h2>
    ${qs}
    <button id="submitCat">Complete category</button>
    <div id="banner"></div>
  </div>`;
}

async function submitCategory(cat) {
  const btn = document.getElementById('submitCat');
  const banner = document.getElementById('banner');
  const n = cat.questionCount || 0;
  const answers = {};
  const bonusAnswers = {};
  for (let i = 0; i < n; i++) {
    const el = document.getElementById(`q${i}`);
    if (!el) return; // active panel was rebuilt mid-submit (host edited categories) — abort this stale submit; the re-render wires a fresh button
    answers[i] = el.value.trim();
    if (cat.bonus?.[i]) {
      const bEl = document.getElementById(`qb${i}`);
      if (bEl) bonusAnswers[i] = bEl.value.trim();
    }
  }
  btn.disabled = true;
  try {
    if (await isGameLockedFor({ db, ref, get, lobbyId: session.lobbyId, teamId: session.teamId, gameKey: KEY })) {
      banner.className = 'banner bad'; banner.textContent = 'Locked — not saved.'; btn.disabled = false; return;
    }
    const payload = { submittedAt: Date.now(), answers };
    if (Object.keys(bonusAnswers).length) payload.bonusAnswers = bonusAnswers;
    await set(ref(db, `${subsPath}/${cat.id}`), payload);
    // the live submissions listener re-renders -> next category (or score) appears
  } catch (e) {
    banner.className = 'banner bad'; banner.textContent = 'Save failed: ' + (e.message || 'unknown error');
    btn.disabled = false;
  }
}

(async () => {
  if (await isGameLockedFor({ db, ref, get, lobbyId: session.lobbyId, teamId: session.teamId, gameKey: KEY })) {
    renderLockedScreen(catalogHref);
    return;
  }
  // Attach live listeners only AFTER the lock gate passes, so a locked team
  // never briefly sees quiz content.
  onValue(ref(db, `${LOBBY}/quiz/categories`), snap => {
    categories = snap.exists() ? snap.val() : null; catsLoaded = true; render();
  });
  onValue(ref(db, subsPath), snap => {
    submissions = snap.exists() ? snap.val() : null; render();
  });
  onValue(ref(db, `${LOBBY}/rules`), snap => {
    currentRules = snap.exists() ? snap.val() : null;
    const el = container.querySelector('.rules');
    if (el) el.innerHTML = renderRules(rulesText());
  });
})();
</script>
</body>
</html>
