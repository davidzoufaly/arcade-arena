name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the deploy job to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # firebase-config.js is gitignored (kept out of the repo). The full file
      # contents live in the FIREBASE_CONFIG repo secret; write it before build.
      - name: Write firebase config
        run: printf '%s' "$FIREBASE_CONFIG" > ps-offsite-2026/firebase-config.js
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}

      # postinstall runs scripts/fetch-vision-assets.mjs (wasm + .task models).
      - run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "1"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4