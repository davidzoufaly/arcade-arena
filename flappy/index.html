<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Save the Customer</title>
  <link rel="stylesheet" href="../shared/neon.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud" id="hud">SCORE 0</div>
  <div class="banner" id="banner"></div>
  <div class="stage-track" id="stages">
    <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="stage-progress"><div class="stage-progress-fill" id="stage-progress"></div></div>
  <div id="debug" style="position:fixed;top:148px;right:16px;width:160px;font:11px/1.3 'Courier New',monospace;color:#0ff;background:rgba(0,0,0,0.5);padding:6px;z-index:11;text-shadow:0 0 4px #0ff"></div>
  <div id="noise-meter" style="position:fixed;left:16px;top:60px;bottom:60px;width:18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,90,60,0.5);border-radius:9px;z-index:10;overflow:hidden;pointer-events:none">
    <div id="noise-fill" style="position:absolute;bottom:0;left:0;right:0;height:0%;background:linear-gradient(0deg,#ff5a3c,#ffff00,#ff00ff);transition:height 0.04s linear"></div>
    <div id="noise-threshold" style="position:absolute;left:-3px;right:-3px;height:2px;background:#00ffff;bottom:8%;box-shadow:0 0 4px #00ffff"></div>
  </div>
  <div id="noise-label" style="position:fixed;left:8px;top:30px;width:34px;font:10px 'Courier New',monospace;color:#ff5a3c;text-align:center;z-index:10;pointer-events:none;letter-spacing:0.05em">VOICE</div>
  <div class="scanlines"></div>
  <div class="title-overlay" id="title">
    <h1>SAVE THE CUSTOMER</h1>
    <p>Customer's dashboard exploded.<br>Fly insights home through corrupted pipes.</p>
    <p style="color:var(--brand);text-shadow:0 0 12px var(--brand)">YELL TO FLY</p>
    <p class="hint">PRESS SPACE TO START</p>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
