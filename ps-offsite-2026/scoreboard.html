<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS Offsite 2026 — Scoreboard</title>
<style>
  :root {
    --bg: #0a0e1a;
    --bg-2: #131a2e;
    --card: #1b2540;
    --card-hover: #243056;
    --text: #f5f7fb;
    --muted: #8b95b5;
    --accent: #00d4ff;
    --accent-2: #ff00aa;
    --gold: #ffd84d;
    --silver: #d6d8dc;
    --bronze: #d49a6a;
    --good: #00e676;
    --bad: #ff4d6d;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 20% 0%, #1f2a4a 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    position: sticky; top: 56px; z-index: 10;
    background: rgba(10,14,26,0.85);
  }
  header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  button {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  button:hover {
    background: var(--card-hover);
    transform: translateY(-1px);
  }
  button.primary {
    background: linear-gradient(135deg, var(--accent), #0099cc);
    border: none;
    color: #001;
  }
  button.danger { color: var(--bad); }
  .admin-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .admin-chip {
    background: linear-gradient(135deg, var(--accent-2), #b8008f);
    color: #fff;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 4px;
    line-height: 1;
  }
  .matrix-row.missing-cell { box-shadow: inset 0 0 0 1px rgba(255,77,109,0.4); }
  .cell-game.missing-hl {
    color: var(--bad) !important;
    opacity: 1 !important;
    font-weight: 800 !important;
  }
  main { padding: 40px; max-width: 1600px; margin: 0 auto; }
  .layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 32px;
  }
  @media (max-width: 1100px) {
    .layout { grid-template-columns: 1fr; }
  }
  .matrix-wrap {
    background: var(--card);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.06);
    overflow-x: auto;
  }
  .matrix {
    min-width: 720px;
  }
  .matrix-row {
    display: grid;
    grid-template-columns: 56px minmax(180px, 1fr) repeat(10, 84px) 132px;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .matrix-row:last-child { border-bottom: none; }
  .matrix-row.shine::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.15), transparent);
    animation: shine 1.5s ease-out;
    pointer-events: none;
  }
  @keyframes shine {
    from { transform: translateX(-100%); }
    to { transform: translateX(100%); }
  }
  .matrix-head {
    background: rgba(0,0,0,0.28);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 700;
    padding-top: 12px;
    padding-bottom: 12px;
  }
  .matrix-head .cell-game,
  .matrix-head .cell-total { color: var(--text); }
  .matrix-head .cell-game a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dashed rgba(255,255,255,0.15);
    padding-bottom: 1px;
  }
  .matrix-head .cell-game a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .matrix-row.team:hover { background: rgba(255,255,255,0.02); }
  .matrix-row.top1 { background: linear-gradient(90deg, rgba(255,216,77,0.08), transparent 70%); }
  .matrix-row.top1 .cell-rank { color: var(--gold); }
  .matrix-row.top2 .cell-rank { color: var(--silver); }
  .matrix-row.top3 .cell-rank { color: var(--bronze); }
  .cell-rank {
    font-size: 26px;
    font-weight: 900;
    color: var(--muted);
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .cell-team-name {
    font-size: 18px;
    font-weight: 700;
  }
  .cell-team-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .cell-game {
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .cell-game.empty {
    color: var(--muted);
    opacity: 0.35;
    font-weight: 500;
  }
  .cell-game.has {
    color: var(--good);
  }
  .cell-game .cell-raw { font-size: 11px; color: var(--muted); line-height: 1.2; }
  .cell-game .cell-pts { font-size: 18px; font-weight: 800; color: var(--text); line-height: 1.1; }
  .cell-game.has { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .cell-total {
    text-align: right;
    font-size: 32px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-variant-numeric: tabular-nums;
  }
  .cell-total.bump { animation: pulse 0.6s cubic-bezier(0.4, 0, 0.2, 1); display: inline-block; }
  .pill {
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  aside {
    background: var(--card);
    border-radius: 20px;
    padding: 28px;
    border: 1px solid rgba(255,255,255,0.06);
    height: fit-content;
    position: sticky;
    top: 100px;
  }
  aside h2 {
    font-size: 18px;
    margin-bottom: 16px;
    color: var(--text);
  }
  .games-legend {
    padding-top: 0;
    border-top: none;
  }
  .games-legend .pill { font-family: ui-monospace, monospace; }
  .legend-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 13px;
    color: var(--muted);
  }
  .legend-link {
    text-decoration: none;
    border-radius: 8px;
    padding: 8px 10px;
    margin: 0 -10px;
    transition: background 0.15s, color 0.15s;
  }
  .legend-link:hover {
    background: var(--bg-2);
    color: var(--text);
  }
  .legend-link span:first-child {
    display: flex; align-items: center; gap: 8px;
  }
  .legend-arrow {
    color: var(--muted);
    font-size: 14px;
    opacity: 0.6;
    transition: opacity 0.15s, transform 0.15s;
  }
  .legend-link:hover .legend-arrow {
    opacity: 1;
    transform: translate(2px, -2px);
    color: var(--accent);
  }
  .actions-row {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .actions-row button { flex: 1; min-width: 100px; }

  .empty {
    background: var(--card);
    border: 2px dashed rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 60px 40px;
    text-align: center;
    color: var(--muted);
  }
  .empty h3 { font-size: 22px; margin-bottom: 12px; color: var(--text); }
  .empty p { font-size: 14px; line-height: 1.6; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .confetti {
    position: fixed;
    pointer-events: none;
    inset: 0;
    z-index: 100;
    overflow: hidden;
  }
  .confetti span {
    position: absolute;
    width: 10px; height: 14px;
    top: -20px;
    animation: fall 3s linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }
</style>
<link rel="stylesheet" href="./shared/topbar.css">
<script type="module">
  import { mountTopbar } from './shared/topbar.js';
  mountTopbar({ activePage: 'scoreboard' });
</script>
</head>
<body>
<header>
  <div>
    <h1>PS Offsite 2026 — Scoreboard</h1>
    <div class="subtitle" id="subtitle">11 games · one winner</div>
  </div>
  <div class="controls">
    <button onclick="addTeam()">+ Add team</button>
    <button onclick="normalizeBoard()" class="admin-btn"><span class="admin-chip">ADMIN</span>Normalize</button>
    <button onclick="resetAll()" class="admin-btn danger"><span class="admin-chip">ADMIN</span>Reset</button>
  </div>
</header>

<main>
  <div class="layout">
    <div>
      <div class="matrix-wrap"><div class="matrix" id="leaderboard"></div></div>
    </div>

    <aside>
      <div class="games-legend">
        <h2 style="font-size:14px; margin-bottom:8px">Open game</h2>
        <a class="legend-row legend-link" href="games/1-gesture-lock.html" target="_blank" rel="noopener">
          <span><span class="pill">GZ</span> Gesture Lock</span><span class="legend-arrow">↗</span>
        </a>
        <a class="legend-row legend-link" href="games/2-pantomime.html" target="_blank" rel="noopener">
          <span><span class="pill">PM</span> Pantomime</span><span class="legend-arrow">↗</span>
        </a>
        <a class="legend-row legend-link" href="dino/index.html" target="_blank" rel="noopener">
          <span><span class="pill">DN</span> Pipeline Dash</span><span class="legend-arrow">↗</span>
        </a>
        <a class="legend-row legend-link" href="flappy/index.html" target="_blank" rel="noopener">
          <span><span class="pill">FL</span> Insight Monitor</span><span class="legend-arrow">↗</span>
        </a>
        <a class="legend-row legend-link" href="index.html" target="_blank" rel="noopener" style="margin-top: 8px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06);">
          <span><span class="pill" style="background: rgba(255,0,170,0.15); color: var(--accent-2);">QR</span> Hub & QR generator</span><span class="legend-arrow">↗</span>
        </a>
      </div>

      <div class="actions-row">
        <button onclick="exportData()">Export JSON</button>
        <button onclick="document.getElementById('importInput').click()">Import JSON</button>
        <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
      </div>
    </aside>
  </div>
</main>

<div class="confetti" id="confetti"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
import { getDatabase, ref, set, update, remove, push, onValue, get } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js';
import { firebaseConfig } from './firebase-config.js';
import { createLobbyApi } from './shared/lobby.js';
import { GAMES, allEnteredKeys } from './shared/games-catalog.js';
import { rankPointsByTeam } from './shared/ranking.js';

const lobbyId = new URLSearchParams(location.search).get('lobby');
if (!lobbyId) {
  location.replace('index.html');
  throw new Error('no lobby in url');
}
const LOBBY_PATH = `lobbies/${lobbyId}`;

function showSetupNeeded(msg) {
  document.body.innerHTML = `
    <div style="max-width:640px;margin:80px auto;padding:32px;background:#1b2540;border-radius:16px;border:1px solid rgba(255,255,255,0.06);color:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.6">
      <h1 style="font-size:24px;margin-bottom:16px;background:linear-gradient(90deg,#00d4ff,#ff00aa);-webkit-background-clip:text;background-clip:text;color:transparent">Firebase setup needed</h1>
      <p style="color:#8b95b5;margin-bottom:16px">${msg}</p>
      <p>Follow <a href="SETUP.md" style="color:#00d4ff">SETUP.md</a> to create a Firebase project, then copy <code>firebase-config.example.js</code> to <code>firebase-config.js</code> and fill in your values.</p>
    </div>`;
}

if (!firebaseConfig?.databaseURL || firebaseConfig.databaseURL.includes('REPLACE_ME')) {
  showSetupNeeded('Your <code>firebase-config.js</code> still has placeholder values.');
  throw new Error('firebase config not filled in');
}

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const lobbyApi = createLobbyApi({
  get: async (path) => {
    const snap = await get(ref(db, path));
    return snap.exists() ? snap.val() : null;
  },
  set: async (path, value) => set(ref(db, path), value),
});

const ADMIN_PWD_KEY = `psOffsite2026.adminPwd.${lobbyId}`;
async function requireAdmin() {
  let cached = null;
  try { cached = sessionStorage.getItem(ADMIN_PWD_KEY); } catch {}
  if (cached && await lobbyApi.verifyAdminPwd(lobbyId, cached)) return true;
  const entered = prompt(`Admin password for lobby ${lobbyId}:`);
  if (!entered) return false;
  const pwd = entered.trim().toUpperCase();
  const ok = await lobbyApi.verifyAdminPwd(lobbyId, pwd);
  if (!ok) { alert('Wrong admin password.'); return false; }
  try { sessionStorage.setItem(ADMIN_PWD_KEY, pwd); } catch {}
  return true;
}

let state = { teams: [], history: [] };
let initialized = false;

function snapshotToState(snap) {
  const root = snap.val() ?? {};
  const teamsObj = root.teams ?? {};
  const scoresObj = root.scores ?? {};
  const historyObj = root.history ?? {};
  const teams = Object.values(teamsObj)
    .filter(Boolean)
    .map(t => ({ id: t.id, name: t.name, scores: scoresObj[t.id] ?? {} }))
    .sort((a, b) => a.id - b.id);
  const history = Object.values(historyObj).filter(Boolean).sort((a, b) => a.ts - b.ts);
  return { teams, history };
}

onValue(ref(db, LOBBY_PATH), snap => {
  state = snapshotToState(snap);
  render();
  const leader = computeLeader();
  const leaderId = leader?.id ?? null;
  if (initialized && leader && leaderId !== prevLeaderId && state.teams.length > 0) {
    bumpedTeam = { id: leaderId, until: Date.now() + 4000 };
    confetti();
    render();
  }
  prevLeaderId = leaderId;
  initialized = true;
});

async function addTeam() {
  const nextId = Math.max(0, ...state.teams.map(t => t.id)) + 1;
  const name = prompt('Team name:', `Team ${nextId}`);
  if (!name) return;
  await update(ref(db, `${LOBBY_PATH}/teams/${nextId}`), { id: nextId, name });
}
window.addTeam = addTeam;

async function renameTeam(id) {
  const t = state.teams.find(x => x.id === id);
  if (!t) return;
  const name = prompt('New name:', t.name);
  if (name && name.trim()) {
    await update(ref(db, `${LOBBY_PATH}/teams/${id}`), { name: name.trim() });
  }
}
window.renameTeam = renameTeam;

async function removeTeam(id) {
  if (!confirm('Remove this team?')) return;
  await remove(ref(db, `${LOBBY_PATH}/teams/${id}`));
  await remove(ref(db, `${LOBBY_PATH}/scores/${id}`));
}
window.removeTeam = removeTeam;

async function resetAll() {
  if (!await requireAdmin()) return;
  if (!confirm(`Wipe scores and history for lobby ${lobbyId}? Teams are kept. This affects everyone in this lobby.`)) return;
  await set(ref(db, `${LOBBY_PATH}/scores`), null);
  await set(ref(db, `${LOBBY_PATH}/history`), null);
}
window.resetAll = resetAll;

async function normalizeBoard() {
  if (!await requireAdmin()) return;
  const gameKeys = allEnteredKeys();
  const missingByTeam = state.teams
    .map(t => ({
      id: t.id,
      name: t.name,
      missing: gameKeys.filter(g => t.scores[g] === undefined),
    }))
    .filter(x => x.missing.length > 0);

  highlightMissing(missingByTeam);

  if (missingByTeam.length === 0) {
    alert(`All ${state.teams.length} teams have scores for all ${gameKeys.length} games. Board is complete.`);
    return;
  }
  const lines = missingByTeam.map(t =>
    `• ${t.name} (#${t.id}) — missing: ${t.missing.map(g => GAMES[g].name).join(', ')}`
  );
  alert(`Missing scores:\n\n${lines.join('\n')}`);
}
window.normalizeBoard = normalizeBoard;

let missingHighlight = null;
function highlightMissing(missingByTeam) {
  missingHighlight = new Map(missingByTeam.map(t => [t.id, new Set(t.missing)]));
  render();
  setTimeout(() => { missingHighlight = null; render(); }, 8000);
}

function formatPts(p) {
  if (p === undefined || p === null) return '0';
  return Number.isInteger(p) ? String(p) : p.toFixed(1);
}

function computeLeader() {
  const gameKeys = allEnteredKeys();
  const teamCount = state.teams.length;
  const rankByGame = {};
  for (const g of gameKeys) {
    const raw = {};
    for (const t of state.teams) {
      const v = t.scores[g];
      if (typeof v === 'number') raw[t.id] = v;
    }
    rankByGame[g] = rankPointsByTeam({ teamCount, raw });
  }
  const sorted = [...state.teams]
    .map(t => {
      let total = 0;
      for (const g of gameKeys) total += rankByGame[g]?.[t.id] ?? 0;
      return { ...t, total };
    })
    .sort((a, b) => b.total - a.total);
  return sorted[0];
}

const GAME_LINKS = {
  GZ: 'games/1-gesture-lock.html',
  PM: 'games/2-pantomime.html',
  DN: 'dino/index.html',
  FL: 'flappy/index.html',
};

function render() {
  const list = document.getElementById('leaderboard');
  if (state.teams.length === 0) {
    list.innerHTML = '<div class="empty"><h3>No teams yet</h3><p>Click "+ Add team" at the top to start adding participants.</p></div>';
    return;
  }
  const bumpedTeamId = bumpedTeam && bumpedTeam.until > Date.now() ? bumpedTeam.id : null;
  const gameKeys = allEnteredKeys();
  const teamCount = state.teams.length;
  const rankByGame = {};
  for (const g of gameKeys) {
    const raw = {};
    for (const t of state.teams) {
      const v = t.scores[g];
      if (typeof v === 'number') raw[t.id] = v;
    }
    rankByGame[g] = rankPointsByTeam({ teamCount, raw });
  }
  const sorted = [...state.teams]
    .map(t => {
      let total = 0;
      for (const g of gameKeys) total += rankByGame[g]?.[t.id] ?? 0;
      return {
        ...t,
        total,
        gameCount: Object.keys(t.scores).length,
      };
    })
    .sort((a, b) => b.total - a.total || a.id - b.id);

  const headCells = gameKeys.map(g => {
    const href = GAME_LINKS[g];
    const label = href
      ? `<a href="${href}" target="_blank" rel="noopener" title="${escapeHtml(GAMES[g].name)}">${g}</a>`
      : g;
    return `<div class="cell-game">${label}</div>`;
  }).join('');
  const head = `
    <div class="matrix-row matrix-head">
      <div class="cell-rank">#</div>
      <div>Team</div>
      ${headCells}
      <div class="cell-total">Total</div>
    </div>
  `;

  const rows = sorted.map((t, i) => {
    const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const shine = t.id === bumpedTeamId ? 'shine' : '';
    const bump = t.id === bumpedTeamId ? 'bump' : '';
    const teamMissing = missingHighlight ? missingHighlight.get(t.id) : null;
    const rowMissing = teamMissing && teamMissing.size > 0 ? 'missing-cell' : '';
    const cells = gameKeys.map(g => {
      const v = t.scores[g];
      if (v === undefined) {
        const hl = teamMissing && teamMissing.has(g) ? ' missing-hl' : '';
        return `<div class="cell-game empty${hl}">—</div>`;
      }
      const pts = rankByGame[g]?.[t.id];
      return `<div class="cell-game has" title="Raw ${v}; ${formatPts(pts)} rank pts">
    <div class="cell-raw">${v}</div>
    <div class="cell-pts">${formatPts(pts)}</div>
  </div>`;
    }).join('');
    return `
      <div class="matrix-row team ${rankClass} ${shine} ${rowMissing}" ondblclick="renameTeam(${t.id})" oncontextmenu="event.preventDefault(); removeTeam(${t.id})">
        <div class="cell-rank">${i + 1}</div>
        <div>
          <div class="cell-team-name">${escapeHtml(t.name)}</div>
          <div class="cell-team-meta">${t.gameCount}/${gameKeys.length} games · dbl-click rename · right-click remove</div>
        </div>
        ${cells}
        <div class="cell-total ${bump}">${formatPts(t.total)}</div>
      </div>
    `;
  }).join('');

  list.innerHTML = head + rows;
  document.getElementById('subtitle').textContent = `Lobby ${lobbyId} · ${state.teams.length} teams · ${state.history.length} submissions`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function confetti() {
  const wrap = document.getElementById('confetti');
  const colors = ['#00d4ff','#ff00aa','#ffd84d','#00e676','#ff4d6d'];
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('span');
    s.style.left = Math.random() * 100 + 'vw';
    s.style.background = colors[Math.floor(Math.random() * colors.length)];
    s.style.animationDelay = Math.random() * 0.5 + 's';
    s.style.transform = `rotate(${Math.random() * 360}deg)`;
    wrap.appendChild(s);
    setTimeout(() => s.remove(), 3500);
  }
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ps-offsite-scores-${new Date().toISOString().slice(0,16).replace(/[:T]/g,'-')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.teams || !Array.isArray(data.teams)) throw new Error('bad shape');
      // Convert exported array shape back into RTDB object shape
      const teamsObj = {};
      const scoresObj = {};
      for (const t of data.teams) {
        teamsObj[t.id] = { id: t.id, name: t.name };
        if (t.scores) scoresObj[t.id] = t.scores;
      }
      const historyObj = {};
      if (Array.isArray(data.history)) {
        for (const h of data.history) {
          const k = push(ref(db, `${LOBBY_PATH}/history`)).key;
          historyObj[k] = h;
        }
      }
      await set(ref(db, LOBBY_PATH), { teams: teamsObj, scores: scoresObj, history: historyObj });
      alert('Imported.');
    } catch (err) {
      alert('Invalid file format.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}
window.exportData = exportData;
window.importData = importData;

let bumpedTeam = null;
let prevLeaderId = null;
render();
</script>
