<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <script>(function(){try{var t=localStorage.getItem('ps-theme')||(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  :root {
    --bg: #09090C;
    --bg-2: #18181B;
    --card: #222224;
    --card-hover: #3A3A3D;
    --text: #FFFFFF;
    --muted: #848486;
    --accent: #DAFE85;
    --accent-2: #657BC7;
    --gold: #ffd84d;
    --silver: #d6d8dc;
    --bronze: #d49a6a;
    --good: #00e676;
    --bad: #ff4d6d;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 20% 0%, var(--bg-2) 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
    position: sticky; top: 56px; z-index: 10;
    background: var(--card);
  }
  header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .head-left {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 6px 16px;
  }
  header .subtitle {
    font-size: 15px;
    color: var(--muted);
  }
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  button:hover {
    background: var(--card-hover);
    transform: translateY(-1px);
  }
  button.primary {
    background: linear-gradient(135deg, var(--accent), #657BC7);
    border: none;
    color: var(--btn-on-accent);
  }
  button.danger { color: var(--bad); }
  main { padding: 40px; max-width: 1600px; margin: 0 auto; }
  .matrix-wrap {
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow-x: auto;
  }
  .matrix {
    min-width: 720px;
  }
  .matrix-row {
    display: grid;
    grid-template-columns: 56px minmax(120px, 0.6fr) repeat(var(--game-cols, 10), 84px) 132px;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .matrix-row:last-child { border-bottom: none; }
  .matrix-row.shine::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(218,254,133,0.15), transparent);
    animation: shine 1.5s ease-out;
    pointer-events: none;
  }
  @keyframes shine {
    from { transform: translateX(-100%); }
    to { transform: translateX(100%); }
  }
  .matrix-head {
    align-items: end;
    background: var(--bg-2);
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 700;
    padding-top: 12px;
    padding-bottom: 12px;
  }
  .matrix-head .cell-game,
  .matrix-head .cell-total { color: var(--text); }
  .matrix-head .cell-game {
    font-size: 13px;
    line-height: 1.25;
    white-space: normal;
    word-break: break-word;
    hyphens: auto;
  }
  .matrix-row.team:hover { background: rgba(255,255,255,0.02); }
  .matrix-row.top1 { background: linear-gradient(90deg, rgba(255,216,77,0.08), transparent 70%); }
  .matrix-row.top1 .cell-rank { color: var(--gold); }
  .matrix-row.top2 .cell-rank { color: var(--silver); }
  .matrix-row.top3 .cell-rank { color: var(--bronze); }
  .cell-rank {
    font-size: 26px;
    font-weight: 900;
    color: var(--muted);
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .cell-team-name {
    font-size: 18px;
    font-weight: 700;
  }
  .cell-team-meta {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }
  .cell-game {
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .cell-game.empty {
    color: var(--muted);
    font-weight: 500;
  }
  .cell-game.has {
    color: var(--good);
  }
  .cell-game .cell-raw { font-size: 13px; color: var(--muted); line-height: 1.2; }
  .cell-game .cell-pts { font-size: 18px; font-weight: 800; color: var(--text); line-height: 1.1; }
  .cell-game.has { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .cell-game.edit { padding: 0 4px; }
  .cell-input {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid rgba(218,254,133,0.4);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 4px;
    font-size: 17px;
    font-weight: 700;
    text-align: center;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
  }
  .cell-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(218,254,133,0.25); }
  .lock-btn {
    background: transparent; border: none; cursor: pointer;
    font-size: 16px; line-height: 1; padding: 2px 4px; margin-top: 4px;
    opacity: 0.85;
  }
  .lock-btn:hover { opacity: 1; transform: scale(1.12); }
  .lock-btn { font-size: 15px; margin-top: 0; padding: 1px 3px; }  /* match cfg-btn; margin-top from old layout, killed inside the row */
  .edit-btns { display: flex; flex-wrap: nowrap; gap: 2px; justify-content: center; align-items: center; margin-top: 4px; }
  .edit-btns button { font-size: 15px; line-height: 1; padding: 1px 3px; width: 22px; height: 20px; display: inline-flex; align-items: center; justify-content: center; }
  .cfg-btn {
    background: transparent; border: none; cursor: pointer;
    font-size: 15px; line-height: 1; padding: 1px 3px; opacity: 0.7; color: var(--text);
    font-family: inherit;
  }
  .cfg-btn:hover { opacity: 1; transform: scale(1.1); }
  /* ⏱ is an emoji — `color` barely changes it; mark "set" with a filled accent pill + ring instead. */
  .cfg-btn.set {
    opacity: 1; font-weight: 800;
    background: var(--accent); color: var(--btn-on-accent);
    border-radius: 999px; padding: 2px 6px;
    box-shadow: 0 0 0 1px var(--accent);
  }

  .cell-game.edit.locked .cell-input { border: 2px solid var(--bad); box-shadow: inset 0 0 0 1px var(--bad); }
  .cell-game.edit.unlocked .cell-input { border: 2px solid var(--good); box-shadow: inset 0 0 0 1px var(--good); }
  .matrix-head .cell-game.lk-locked { color: var(--bad); }
  .matrix-head .cell-game.lk-unlocked { color: var(--good); }
  .lock-all { white-space: nowrap; }
  .cell-total {
    text-align: right;
    font-size: 32px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-variant-numeric: tabular-nums;
  }
  .cell-total.bump { animation: pulse 0.6s cubic-bezier(0.4, 0, 0.2, 1); display: inline-block; }
  .pill {
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .game-status {
    display: inline-block;
    margin-top: 4px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 999px;
    font-weight: 800;
    line-height: 1;
  }
  .game-status.open {
    background: rgba(218,254,133,0.15);
    color: var(--accent);
    border: 1px solid rgba(218,254,133,0.35);
  }
  .game-status.closed {
    background: rgba(0,230,118,0.15);
    color: var(--good);
    border: 1px solid rgba(0,230,118,0.35);
  }
  .matrix-head .cell-game.closed { color: var(--good); }

  .live-status {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 14px;
    font-weight: 600;
    color: var(--good);
  }
  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--good);
    box-shadow: 0 0 0 0 rgba(0,230,118,0.5);
    animation: livePulse 2s infinite;
  }
  @keyframes livePulse {
    0% { box-shadow: 0 0 0 0 rgba(0,230,118,0.5); }
    70% { box-shadow: 0 0 0 7px rgba(0,230,118,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,230,118,0); }
  }
  .live-status.offline { color: var(--gold); }
  .live-status.offline .live-dot {
    background: var(--gold);
    animation: none;
    box-shadow: none;
  }

  .empty {
    padding: 10px 40px;
    text-align: center;
    color: var(--muted);
  }
  .empty h3 { font-size: 22px; margin-bottom: 12px; color: var(--text); }
  .empty p { font-size: 16px; line-height: 1.6; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .confetti {
    position: fixed;
    pointer-events: none;
    inset: 0;
    z-index: 100;
    overflow: hidden;
  }
  .confetti span {
    position: absolute;
    width: 10px; height: 14px;
    top: -20px;
    animation: fall 3s linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }
</style>
<link rel="stylesheet" href="./shared/topbar.css">
<link rel="stylesheet" href="./shared/modal.css">

  import { mountTopbar } from './shared/topbar.js';
  mountTopbar({ activePage: 'scoreboard' });

<body>
<header>
  <div class="head-left">
    <h1>Scoreboard</h1>
    <div class="subtitle" id="subtitle">11 games · one winner</div>
    <div class="live-status" id="liveStatus">
      <span class="live-dot"></span>
      <span class="live-text">Live · connecting…</span>
    </div>
  </div>
  <div class="controls" id="controls"></div>
</header>

<main>
  <div class="matrix-wrap"><div class="matrix" id="leaderboard"></div></div>
</main>

<div class="confetti" id="confetti"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js';
import { firebaseConfig } from './firebase-config.js';
import { GAMES, allEnteredKeys, quizKeys } from './shared/games-catalog.js';
import { allCategoriesSubmitted } from './shared/quiz.js';
import { rankPointsByTeam } from './shared/ranking.js';
import { requireAdmin } from './shared/admin-gate.js';
import { getSession, isAdminSession } from './shared/lobby.js';
import {
  resolveLock, resolveGameLock, resolveAllLock,
  toggleAll, toggleGame, toggleCell,
} from './shared/game-lock.js';
import {
  resolveOverride, hasOverride, setGameOverride, setCellOverride,
} from './shared/game-config.js';
import { openModal } from './shared/modal.js';

const lobbyId = new URLSearchParams(location.search).get('lobby');
if (!lobbyId) {
  location.replace('index.html');
  throw new Error('no lobby in url');
}
const LOBBY_PATH = `lobbies/${lobbyId}`;

function showSetupNeeded(msg) {
  document.body.innerHTML = `
    <div style="max-width:640px;margin:80px auto;padding:32px;background:var(--card);border-radius:16px;border:1px solid var(--border);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.6">
      <h1 style="font-size: 24px;margin-bottom:16px;background:linear-gradient(90deg,#DAFE85,#657BC7);-webkit-background-clip:text;background-clip:text;color:transparent">Firebase setup needed</h1>
      <p style="color:#848486;margin-bottom:16px">${msg}</p>
      <p>Follow <a href="SETUP.md" style="color:var(--accent)">SETUP.md</a> to create a Firebase project, then copy <code>firebase-config.example.js</code> to <code>firebase-config.js</code> and fill in your values.</p>
    </div>`;
}

if (!firebaseConfig?.databaseURL || firebaseConfig.databaseURL.includes('REPLACE_ME')) {
  showSetupNeeded('Your <code>firebase-config.js</code> still has placeholder values.');
  throw new Error('firebase config not filled in');
}

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let state = { teams: [], history: [] };
let initialized = false;
let editing = false;
let lastUpdate = null;
let connected = true;
let locks = null, timers = null, rules = null, quiz = null;  // latest live nodes
let draft = null;                                // { locks, timers, rules } while editing
let dirty = { locks: false, timers: false, rules: false };
let pendingScores = null;

function snapshotToState(snap) {
  const root = snap.val() ?? {};
  const teamsObj = root.teams ?? {};
  const scoresObj = root.scores ?? {};
  const historyObj = root.history ?? {};
  const teams = Object.values(teamsObj)
    .filter(Boolean)
    .map(t => ({ id: t.id, name: t.name, scores: scoresObj[t.id] ?? {} }))
    .sort((a, b) => a.id - b.id);
  const history = Object.values(historyObj).filter(Boolean).sort((a, b) => a.ts - b.ts);
  return { teams, history };
}

onValue(ref(db, LOBBY_PATH), snap => {
  lastUpdate = Date.now();
  renderLiveStatus();
  locks = snap.val()?.locks ?? null;
  timers = snap.val()?.timers ?? null;
  rules = snap.val()?.rules ?? null;
  quiz = snap.val()?.quiz ?? null;
  state = snapshotToState(snap);
  const leader = computeLeader();
  const leaderId = leader?.id ?? null;
  // While admin is editing, leave the inputs untouched — refresh once they exit.
  if (editing) {
    prevLeaderId = leaderId;
    initialized = true;
    return;
  }
  render();
  if (initialized && leader && leaderId !== prevLeaderId && state.teams.length > 0) {
    bumpedTeam = { id: leaderId, until: Date.now() + 4000 };
    confetti();
    render();
  }
  prevLeaderId = leaderId;
  initialized = true;
});

async function resetAll() {
  if (!await requireAdmin(lobbyId)) return;
  openModal({
    title: '⚠️ Reset scoreboard?',
    bodyHtml: `<p>Wipe all scores and history for lobby <strong>${escapeHtml(lobbyId)}</strong>? Teams are kept. This affects everyone in this lobby and can't be undone.</p>`,
    confirmLabel: 'Reset everything',
    danger: true,
    onConfirm: async () => {
      await set(ref(db, `${LOBBY_PATH}/scores`), null);
      await set(ref(db, `${LOBBY_PATH}/history`), null);
      await set(ref(db, `${LOBBY_PATH}/timerStarts`), null);
      // Reset only appears in edit mode; exit it so the now-stale edit form
      // (whose inputs still hold pre-reset values) can't resurrect them on Save.
      if (editing) cancelEdits();
    },
  });
}

const adminSession = getSession();
const isAdmin = isAdminSession(adminSession) && adminSession.lobbyId === lobbyId;

function renderControls() {
  const controls = document.getElementById('controls');
  controls.innerHTML = '';
  if (!isAdmin) return;
  if (editing) {
    const saveBtn = document.createElement('button');
    saveBtn.className = 'primary';
    saveBtn.textContent = 'Save';
    saveBtn.addEventListener('click', saveEdits);
    const cancelBtn = document.createElement('button');
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', cancelEdits);
    const allBtn = document.createElement('button');
    allBtn.className = 'lock-all';
    allBtn.textContent = resolveAllLock(draft.locks) === 'locked' ? 'Unlock all' : 'Lock all';
    allBtn.addEventListener('click', () => {
      captureScoreInputs();
      toggleAll(draft.locks);
      dirty.locks = true;
      renderControls();
      render();
    });
    const resetBtn = document.createElement('button');
    resetBtn.className = 'danger';
    resetBtn.textContent = 'Reset';
    resetBtn.addEventListener('click', resetAll);
    controls.append(saveBtn, cancelBtn, allBtn, resetBtn);
  } else {
    const editBtn = document.createElement('button');
    editBtn.textContent = 'Edit';
    editBtn.addEventListener('click', startEdits);
    controls.append(editBtn);
  }
}

function startEdits() {
  editing = true;
  draft = {
    locks: locks ? JSON.parse(JSON.stringify(locks)) : {},
    timers: timers ? JSON.parse(JSON.stringify(timers)) : {},
    rules: rules ? JSON.parse(JSON.stringify(rules)) : {},
  };
  dirty = { locks: false, timers: false, rules: false };
  pendingScores = {};
  renderControls();
  render();
}

function cancelEdits() {
  editing = false;
  draft = null;
  dirty = { locks: false, timers: false, rules: false };
  pendingScores = null;
  renderControls();
  render();
}

// Snapshot current score inputs so a lock-toggle re-render doesn't lose typing.
function captureScoreInputs() {
  pendingScores ??= {};
  for (const el of document.querySelectorAll('.cell-input')) {
    (pendingScores[el.dataset.team] ??= {})[el.dataset.game] = el.value;
  }
}

// Wire lock toggle buttons after each editing render (innerHTML wipes listeners).
function wireEditButtons() {
  for (const btn of document.querySelectorAll('.lock-btn')) {
    btn.addEventListener('click', () => {
      captureScoreInputs();
      const g = btn.dataset.game;
      if (btn.dataset.team !== undefined) toggleCell(draft.locks, g, Number(btn.dataset.team));
      else toggleGame(draft.locks, g);
      dirty.locks = true;
      render();
    });
  }
  for (const btn of document.querySelectorAll('.clock-btn')) {
    btn.addEventListener('click', () => openClockModal(btn.dataset.game, btn.dataset.team));
  }
  for (const btn of document.querySelectorAll('.rules-btn')) {
    btn.addEventListener('click', () => openRulesModal(btn.dataset.game, btn.dataset.team));
  }
}

// Prefill with the OWN-LEVEL override only (not the resolved cell>game value), so
// clearing removes exactly this level and the modal never silently pins an
// inherited value.
function openClockModal(g, teamRaw) {
  const teamId = teamRaw !== undefined ? Number(teamRaw) : undefined;
  const cur = teamId !== undefined ? draft.timers?.cells?.[g]?.[teamId] : draft.timers?.games?.[g];
  const level = teamId !== undefined ? `Team ${teamId}` : 'all teams';
  openModal({
    title: `⏱ Time limit · ${escapeHtml(GAMES[g].name)} · ${level}`,
    bodyHtml: `<label>Minutes (blank or 0 = no limit)</label>
      <input id="cfgInput" type="number" min="1" step="1" inputmode="numeric" value="${cur != null ? escapeHtml(String(cur)) : ''}">`,
    onConfirm: () => {
      const val = Number(document.getElementById('cfgInput').value);
      captureScoreInputs();
      if (teamId !== undefined) setCellOverride(draft.timers, g, teamId, val);
      else setGameOverride(draft.timers, g, val);
      dirty.timers = true;
      render();
    },
  });
}

function openRulesModal(g, teamRaw) {
  const teamId = teamRaw !== undefined ? Number(teamRaw) : undefined;
  const cur = teamId !== undefined ? draft.rules?.cells?.[g]?.[teamId] : draft.rules?.games?.[g];
  const level = teamId !== undefined ? `Team ${teamId}` : 'all teams';
  const def = GAMES[g].rules || '';
  // Prefill the catalog default as editable text (own-level override wins if set), so
  // the admin can extend the defaults. Clearing the box falls back to the default again.
  const text = cur != null ? String(cur) : def;
  openModal({
    title: `📋 Rules · ${escapeHtml(GAMES[g].name)} · ${level}`,
    bodyHtml: `<label>Rules text (clear to fall back to the default)</label>
      <textarea id="cfgInput" placeholder="${escapeHtml(def)}">${escapeHtml(text)}</textarea>`,
    onConfirm: () => {
      const val = document.getElementById('cfgInput').value.trim();
      captureScoreInputs();
      if (teamId !== undefined) setCellOverride(draft.rules, g, teamId, val);
      else setGameOverride(draft.rules, g, val);
      dirty.rules = true;
      render();
    },
  });
}

async function saveEdits() {
  const inputs = document.querySelectorAll('.cell-input');
  const writes = [];
  for (const el of inputs) {
    const teamId = el.dataset.team;
    const gameKey = el.dataset.game;
    const team = state.teams.find(t => String(t.id) === teamId);
    const prev = team?.scores[gameKey];
    const rawStr = el.value.trim();
    const path = `${LOBBY_PATH}/scores/${teamId}/${gameKey}`;
    if (rawStr === '') {
      if (prev !== undefined) writes.push([path, null]);
      continue;
    }
    const n = Math.max(0, Math.round(Number(rawStr)));
    if (!Number.isFinite(n) || n === prev) continue;
    writes.push([path, n]);
  }
  for (const [path, val] of writes) await set(ref(db, path), val);
  if (dirty.locks) await set(ref(db, `${LOBBY_PATH}/locks`), draft.locks);
  if (dirty.timers) await set(ref(db, `${LOBBY_PATH}/timers`), draft.timers);
  if (dirty.rules) await set(ref(db, `${LOBBY_PATH}/rules`), draft.rules);
  editing = false;
  draft = null;
  dirty = { locks: false, timers: false, rules: false };
  pendingScores = null;
  renderControls();
  render();
}

renderControls();

function formatPts(p) {
  if (p === undefined || p === null) return '0';
  return Number.isInteger(p) ? String(p) : p.toFixed(1);
}

function computeLeader() {
  const gameKeys = allEnteredKeys();
  const teamCount = state.teams.length;
  const rankByGame = {};
  for (const g of gameKeys) {
    const raw = {};
    for (const t of state.teams) {
      const v = t.scores[g];
      if (typeof v === 'number') raw[t.id] = v;
    }
    rankByGame[g] = rankPointsByTeam({ teamCount, raw });
  }
  const sorted = [...state.teams]
    .map(t => {
      let total = 0;
      for (const g of gameKeys) total += rankByGame[g]?.[t.id] ?? 0;
      return { ...t, total };
    })
    .sort((a, b) => b.total - a.total);
  return sorted[0];
}

// Build the edit-mode button row for a game header (teamId undefined) or a cell.
function editButtonsHtml(g, teamId) {
  const isCell = teamId !== undefined;
  const lockState = isCell ? resolveLock(draft.locks, g, teamId) : resolveGameLock(draft.locks, g);
  const lockIcon = lockState === 'locked' ? '🔒' : '🔓';
  const lockTitle = lockState === 'locked'
    ? (isCell ? 'Locked for this team — click to unlock' : 'Locked for all teams — click to unlock')
    : (isCell ? 'Unlocked for this team — click to lock' : 'Unlocked for all teams — click to lock');
  const teamAttr = isCell ? ` data-team="${teamId}"` : '';
  let html = `<button class="lock-btn" data-game="${g}"${teamAttr} title="${lockTitle}">${lockIcon}</button>`;
  if (GAMES[g].kind === 'manual') {
    const mins = resolveOverride(draft.timers, g, teamId);
    const minsSet = hasOverride(draft.timers, g, teamId);
    const clockTitle = minsSet ? `Time limit: ${mins} min — click to change` : 'Set time limit (minutes)';
    html += `<button class="cfg-btn clock-btn ${minsSet ? 'set' : ''}" data-game="${g}"${teamAttr} title="${clockTitle}">⏱</button>`;
  }
  if (GAMES[g].kind === 'manual' || GAMES[g].kind === 'quiz') {
    const rulesSet = hasOverride(draft.rules, g, teamId);
    html += `<button class="cfg-btn rules-btn ${rulesSet ? 'set' : ''}" data-game="${g}"${teamAttr} title="Edit rules">📋</button>`;
  }
  return `<span class="edit-btns">${html}</span>`;
}

function render() {
  const list = document.getElementById('leaderboard');
  if (state.teams.length === 0) {
    list.innerHTML = '<div class="empty"><h3>No teams yet</h3><p>Create a lobby from the join page to add teams.</p></div>';
    return;
  }
  const bumpedTeamId = bumpedTeam && bumpedTeam.until > Date.now() ? bumpedTeam.id : null;
  const gameKeys = allEnteredKeys();
  const teamCount = state.teams.length;
  const rankByGame = {};
  for (const g of gameKeys) {
    const raw = {};
    for (const t of state.teams) {
      const v = t.scores[g];
      if (typeof v === 'number') raw[t.id] = v;
    }
    rankByGame[g] = rankPointsByTeam({ teamCount, raw });
  }
  const sorted = [...state.teams]
    .map(t => {
      let total = 0;
      for (const g of gameKeys) total += rankByGame[g]?.[t.id] ?? 0;
      // Count a team's submitted games. Pub Quiz publishes its score only after
      // the host grades, so a finished-but-ungraded quiz has no score key yet —
      // count it as submitted once the team has submitted every category.
      const submittedGames = new Set(Object.keys(t.scores));
      for (const qk of quizKeys()) {
        if (allCategoriesSubmitted(quiz?.categories, quiz?.submissions?.[t.id])) submittedGames.add(qk);
      }
      return {
        ...t,
        total,
        gameCount: submittedGames.size,
      };
    })
    .sort((a, b) => b.total - a.total || a.id - b.id);

  const submittedByGame = {};
  for (const g of gameKeys) {
    let n = 0;
    for (const t of state.teams) if (typeof t.scores[g] === 'number') n++;
    submittedByGame[g] = n;
  }
  const headCells = gameKeys.map(g => {
    let closed, label;
    if (GAMES[g].kind === 'quiz') {
      // Pub Quiz publishes a team's score after EACH category is graded, so a
      // PQ score alone doesn't mean the quiz is over. It's only "closed" once
      // the admin has graded every category (tracked at quiz/graded/{catId}).
      const catIds = quiz?.categories ? Object.keys(quiz.categories) : [];
      const gradedCount = catIds.filter(id => quiz?.graded?.[id]).length;
      closed = catIds.length > 0 && gradedCount === catIds.length;
      label = closed ? 'closed' : `${gradedCount}/${catIds.length}`;
    } else {
      closed = submittedByGame[g] === teamCount && teamCount > 0;
      label = closed ? 'closed' : `${submittedByGame[g]}/${teamCount}`;
    }
    const cls = closed ? 'closed' : 'open';
    if (editing) {
      const gs = resolveGameLock(draft.locks, g);
      return `<div class="cell-game ${cls} lk-${gs}">${escapeHtml(GAMES[g].name)}<br><span class="game-status ${cls}">${label}</span><br>${editButtonsHtml(g)}</div>`;
    }
    const gs = resolveGameLock(locks, g);
    return `<div class="cell-game ${cls} lk-${gs}">${escapeHtml(GAMES[g].name)}<br><span class="game-status ${cls}">${label}</span></div>`;
  }).join('');
  const head = `
    <div class="matrix-row matrix-head">
      <div class="cell-rank">#</div>
      <div>Team</div>
      ${headCells}
      <div class="cell-total">Total</div>
    </div>
  `;

  const rows = sorted.map((t, i) => {
    const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const shine = t.id === bumpedTeamId ? 'shine' : '';
    const bump = t.id === bumpedTeamId ? 'bump' : '';
    const cells = gameKeys.map(g => {
      const v = t.scores[g];
      if (editing) {
        const cs = resolveLock(draft.locks, g, t.id);
        const typed = pendingScores?.[String(t.id)]?.[g];
        const val = typed !== undefined ? typed : (v ?? '');
        return `<div class="cell-game edit ${cs}"><input class="cell-input" type="number" min="0" step="1" inputmode="numeric" data-team="${t.id}" data-game="${g}" value="${escapeHtml(String(val))}" placeholder="-">${editButtonsHtml(g, t.id)}</div>`;
      }
      if (v === undefined) {
        return `<div class="cell-game empty">-</div>`;
      }
      const pts = rankByGame[g]?.[t.id];
      return `<div class="cell-game has" title="Raw ${v}; ${formatPts(pts)} rank pts">
    <div class="cell-raw">${v}</div>
    <div class="cell-pts">${formatPts(pts)}</div>
  </div>`;
    }).join('');
    return `
      <div class="matrix-row team ${rankClass} ${shine}">
        <div class="cell-rank">${i + 1}</div>
        <div>
          <div class="cell-team-name">${escapeHtml(t.name)}</div>
          <div class="cell-team-meta">${t.gameCount}/${gameKeys.length} games</div>
        </div>
        ${cells}
        <div class="cell-total ${bump}">${formatPts(t.total)}</div>
      </div>
    `;
  }).join('');

  list.style.setProperty('--game-cols', gameKeys.length);
  list.innerHTML = head + rows;
  if (editing) wireEditButtons();
  // Count distinct team+game pairs, not raw history pushes — Pub Quiz publishes
  // a score per graded category and again on every regrade, so a raw push count
  // over-reports PQ. One pair = "this team submitted this game".
  const submissionCount = new Set(state.history.map(h => `${h.teamId}:${h.gameKey}`)).size;
  document.getElementById('subtitle').textContent = editing
    ? `Editing the lobby. Save to apply`
    : `${state.teams.length} teams · ${submissionCount} submissions`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function confetti() {
  const wrap = document.getElementById('confetti');
  const colors = ['#DAFE85','#657BC7','#ffd84d','#00e676','#ff4d6d'];
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('span');
    s.style.left = Math.random() * 100 + 'vw';
    s.style.background = colors[Math.floor(Math.random() * colors.length)];
    s.style.animationDelay = Math.random() * 0.5 + 's';
    s.style.transform = `rotate(${Math.random() * 360}deg)`;
    wrap.appendChild(s);
    setTimeout(() => s.remove(), 3500);
  }
}

let bumpedTeam = null;
let prevLeaderId = null;

function agoText(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 5) return 'just now';
  if (s < 60) return `${s}s ago`;
  return `${Math.floor(s / 60)}m ago`;
}

function renderLiveStatus() {
  const el = document.getElementById('liveStatus');
  if (!el) return;
  const textEl = el.querySelector('.live-text');
  if (!connected) {
    el.classList.add('offline');
    textEl.textContent = 'Reconnecting…';
    return;
  }
  el.classList.remove('offline');
  textEl.textContent = lastUpdate === null
    ? 'Live · connecting…'
    : `Live · updated ${agoText(Date.now() - lastUpdate)}`;
}

onValue(ref(db, '.info/connected'), snap => {
  connected = snap.val() === true;
  renderLiveStatus();
});
setInterval(renderLiveStatus, 1000);
renderLiveStatus();

render();
</script>
