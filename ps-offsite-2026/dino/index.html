<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Wizard Quest</title>
  <link rel="stylesheet" href="../shared/neon.css">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="../shared/topbar.css">
</head>
<body>
  <canvas id="game"></canvas>
  <video id="cam" autoplay muted playsinline></video>
  <div class="hud" id="hud">SCORE 0</div>
  <div class="banner" id="banner"></div>
  <div class="stage-track" id="stages">
    <div class="stage active"><div class="dot"></div><div class="stage-label">FINGER</div></div>
    <div class="stage"><div class="dot"></div><div class="stage-label">HAND</div></div>
    <div class="stage"><div class="dot"></div><div class="stage-label">ARM</div></div>
    <div class="stage"><div class="dot"></div><div class="stage-label">BODY</div></div>
  </div>
  <div class="stage-progress-wrap">
    <span class="stage-progress-name" id="stage-name">FINGER</span>
    <div class="stage-progress"><div class="stage-progress-fill" id="stage-progress"></div></div>
    <span class="stage-progress-count" id="stage-count">0/8</span>
  </div>
  <div id="debug" style="position:fixed;top:204px;right:16px;width:160px;font:11px/1.3 'Courier New',monospace;color:#0ff;background:rgba(0,0,0,0.5);padding:6px;z-index:11;text-shadow:0 0 4px #0ff"></div>
  <div id="finger-meter" style="position:fixed;left:16px;top:116px;width:170px;font:11px 'Courier New',monospace;color:#ffff00;background:rgba(0,0,0,0.5);padding:10px 12px;border:1px solid rgba(255,255,0,0.4);border-radius:8px;z-index:10;pointer-events:none">
    <div style="font-size:10px;color:#ff5a3c;letter-spacing:0.08em;margin-bottom:6px">FINGERS &middot; JUMP</div>
    <div id="finger-dots" style="display:flex;gap:4px;margin-bottom:8px"></div>
    <div style="height:10px;background:rgba(255,255,255,0.08);border-radius:5px;overflow:hidden">
      <div id="jump-fill" style="height:100%;width:0%;background:linear-gradient(90deg,#ffff00,#ff00ff);transition:width 0.05s linear"></div>
    </div>
    <div id="jump-label" style="margin-top:6px;font-size:10px;color:#00ffff">SHOW MORE FINGERS = HIGHER JUMP</div>
  </div>
  <div class="scanlines"></div>
  <div class="title-overlay" id="title">
    <h1>PIPELINE DASH</h1>
    <p>The data pipeline crashed.<br>Run past anomalies. Be the ETL Knight.</p>
    <p style="color:var(--brand);text-shadow:0 0 6px var(--brand)">WAVE / JUMP TO SURVIVE</p>
    <p class="hint">PRESS SPACE TO START</p>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
