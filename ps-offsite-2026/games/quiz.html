<!-- ps-offsite-2026/games/quiz.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS Offsite 2026 — Pub Quiz</title>
<link rel="stylesheet" href="../shared/topbar.css">
<style>
  :root {
    --bg: #0a0e1a; --bg-2: #131a2e; --card: #1b2540;
    --text: #f5f7fb; --muted: #8b95b5;
    --accent: #00d4ff; --accent-2: #ff00aa; --good: #00e676; --bad: #ff4d6d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1f2a4a 0%, var(--bg) 60%);
    color: var(--text); min-height: 100vh;
  }
  main { max-width: 720px; margin: 0 auto; padding: 40px; }
  .head { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .head .emoji { font-size: 48px; }
  h1 { font-size: 32px; font-weight: 900; letter-spacing: -1px; }
  .rules {
    background: var(--card); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px; padding: 20px; margin-bottom: 24px;
    line-height: 1.65; color: #d8def0; font-size: 16px;
  }
  .rules p { margin-bottom: 10px; }
  .rules ul { margin: 6px 0 6px 22px; }
  .progress { color: var(--muted); font-size: 13px; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
  .panel {
    background: var(--card); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px; padding: 22px;
  }
  .panel h2 { font-size: 22px; margin-bottom: 16px; }
  .q { margin-bottom: 14px; }
  .q label { display: block; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 6px; }
  .q input[type=text] {
    background: var(--bg-2); color: var(--text);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    padding: 12px 14px; font-size: 17px; font-family: inherit; width: 100%;
  }
  .q.bonus label { color: var(--accent-2); }
  .q.bonus input[type=text] { border-color: rgba(255,0,170,0.45); }
  .panel input[type=number] {
    background: var(--bg-2); color: var(--text);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    padding: 14px 16px; font-size: 22px; font-weight: 800; font-family: inherit;
    width: 100%; margin-bottom: 14px;
  }
  .panel label.score-label { display: block; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px; }
  .panel button {
    background: linear-gradient(135deg, var(--accent), #0099cc);
    border: none; color: #001; font-weight: 800; font-size: 17px;
    padding: 12px 18px; border-radius: 10px; cursor: pointer; font-family: inherit;
  }
  .panel button:disabled { opacity: 0.5; cursor: default; }
  .panel .current { color: var(--muted); font-size: 15px; margin-bottom: 10px; }
  .panel .current strong { color: var(--good); }
  .banner { margin-top: 12px; padding: 10px 14px; border-radius: 10px; font-size: 15px; font-weight: 700; }
  .banner.ok  { background: rgba(0,230,118,0.12); color: var(--good); }
  .banner.bad { background: rgba(255,77,109,0.12); color: var(--bad); }
  .countdown {
    background: var(--card); border: 1px solid rgba(0,212,255,0.4);
    border-radius: 14px; padding: 16px; margin-bottom: 20px;
    font-size: 30px; font-weight: 900; text-align: center; letter-spacing: 1px;
    color: var(--accent); font-variant-numeric: tabular-nums;
  }
  .countdown.low { color: var(--bad); border-color: rgba(255,77,109,0.6); }
  .back-link { display: inline-block; margin-top: 14px; color: var(--accent); text-decoration: none; font-weight: 700; font-size: 15px; }
</style>
</head>
<body>
<main>
  <div id="container">Loading…</div>
</main>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
import { getDatabase, ref, get, set, onValue } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js';
import { firebaseConfig } from '../firebase-config.js';
import { resolveSession } from '../shared/lobby.js';
import { isGameLockedFor, renderLockedScreen } from '../shared/game-gate.js';
import { mountTopbar } from '../shared/topbar.js';
import { getGame } from '../shared/games-catalog.js';
import { resolveRule } from '../shared/game-config.js';
import { orderedCategories, currentCategoryId } from '../shared/quiz.js';

const KEY = 'PQ';
const session = resolveSession();
if (!session) { location.replace('../index.html'); throw new Error('no session'); }
mountTopbar({ activePage: 'games' });

const game = getGame(KEY);
const container = document.getElementById('container');
const catalogHref = `../games.html?lobby=${encodeURIComponent(session.lobbyId)}&team=${session.teamId}`;

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderRules(text) {
  const blocks = String(text || '').split(/\n\s*\n/);
  return blocks.map(b => {
    const lines = b.split('\n');
    if (lines.every(l => l.startsWith('- '))) {
      return `<ul>${lines.map(l => `<li>${esc(l.slice(2))}</li>`).join('')}</ul>`;
    }
    return `<p>${esc(b.replace(/\n/g, ' '))}</p>`;
  }).join('');
}

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const LOBBY = `lobbies/${session.lobbyId}`;
const subsPath  = `${LOBBY}/quiz/submissions/${session.teamId}`;

// live state
let categories = null;
let catsLoaded = false;
let submissions = null;
let currentRules = null;

function rulesText() {
  return resolveRule(currentRules, KEY, session.teamId, game.rules);
}

function shell(inner) {
  return `
    <div class="head"><div class="emoji">${game.emoji}</div><h1>${esc(game.name)}</h1></div>
    <div class="rules">${renderRules(rulesText())}</div>
    ${inner}`;
}

function render() {
  if (!catsLoaded) return; // keep "Loading…" until first categories snapshot
  const ordered = orderedCategories(categories);
  if (ordered.length === 0) {
    container.innerHTML = shell(`<div class="panel"><h2>Quiz not ready</h2><p class="current">The host hasn't set up any categories yet. Check back soon.</p><a class="back-link" href="${catalogHref}">← Back to catalog</a></div>`);
    return;
  }
  const curId = currentCategoryId(categories, submissions);
  if (curId !== null) { renderCategory(ordered.find(c => c.id === curId), ordered); return; }
  renderDone(ordered);
}

function renderCategory(cat, ordered) {
  const done = ordered.filter(c => (submissions || {})[c.id]).length;
  const n = cat.questionCount || 0;
  let qs = '';
  for (let i = 0; i < n; i++) {
    qs += `<div class="q"><label for="q${i}">Question ${i + 1}</label><input id="q${i}" type="text" autocomplete="off" /></div>`;
    if (cat.bonus?.[i]) {
      qs += `<div class="q bonus"><label for="qb${i}">Question ${i + 1} — Bonus</label><input id="qb${i}" type="text" autocomplete="off" /></div>`;
    }
  }
  container.innerHTML = shell(`
    <div class="progress">Category ${done + 1} of ${ordered.length}</div>
    <div class="panel">
      <h2>${esc(cat.name)}</h2>
      ${qs}
      <button id="submitCat">Submit category</button>
      <div id="banner"></div>
      <a class="back-link" href="${catalogHref}">← Back to catalog</a>
    </div>`);
  document.getElementById('submitCat').addEventListener('click', () => submitCategory(cat));
}

async function submitCategory(cat) {
  const btn = document.getElementById('submitCat');
  const banner = document.getElementById('banner');
  const n = cat.questionCount || 0;
  const answers = {};
  const bonusAnswers = {};
  for (let i = 0; i < n; i++) {
    answers[i] = document.getElementById(`q${i}`).value.trim();
    if (cat.bonus?.[i]) {
      const bEl = document.getElementById(`qb${i}`);
      if (bEl) bonusAnswers[i] = bEl.value.trim();
    }
  }
  btn.disabled = true;
  try {
    if (await isGameLockedFor({ db, ref, get, lobbyId: session.lobbyId, teamId: session.teamId, gameKey: KEY })) {
      banner.className = 'banner bad'; banner.textContent = 'Locked — not saved.'; btn.disabled = false; return;
    }
    const payload = { submittedAt: Date.now(), answers };
    if (Object.keys(bonusAnswers).length) payload.bonusAnswers = bonusAnswers;
    await set(ref(db, `${subsPath}/${cat.id}`), payload);
    // the live submissions listener re-renders -> next category (or score) appears
  } catch (e) {
    banner.className = 'banner bad'; banner.textContent = 'Save failed: ' + (e.message || 'unknown error');
    btn.disabled = false;
  }
}

function renderDone(ordered) {
  container.innerHTML = shell(`
    <div class="progress">All ${ordered.length} categories submitted</div>
    <div class="panel">
      <p class="current">You're done — the host will mark your answers and score your team. Nothing more to do here.</p>
      <a class="back-link" href="${catalogHref}">← Back to catalog</a>
    </div>`);
}

(async () => {
  if (await isGameLockedFor({ db, ref, get, lobbyId: session.lobbyId, teamId: session.teamId, gameKey: KEY })) {
    renderLockedScreen(catalogHref);
    return;
  }
  // Attach live listeners only AFTER the lock gate passes, so a locked team
  // never briefly sees quiz content.
  onValue(ref(db, `${LOBBY}/quiz/categories`), snap => {
    categories = snap.exists() ? snap.val() : null; catsLoaded = true; render();
  });
  onValue(ref(db, subsPath), snap => {
    submissions = snap.exists() ? snap.val() : null; render();
  });
  onValue(ref(db, `${LOBBY}/rules`), snap => {
    currentRules = snap.exists() ? snap.val() : null;
    const el = container.querySelector('.rules');
    if (el) el.innerHTML = renderRules(rulesText());
  });
})();
</script>
</body>
</html>
