<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS Offsite 2026 — Games</title>
<link rel="stylesheet" href="shared/topbar.css">
<style>
  :root {
    --bg: #0a0e1a; --bg-2: #131a2e; --card: #1b2540;
    --text: #f5f7fb; --muted: #8b95b5;
    --accent: #00d4ff; --accent-2: #ff00aa; --good: #00e676;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1f2a4a 0%, var(--bg) 60%);
    color: var(--text); min-height: 100vh;
  }
  main { max-width: 1100px; margin: 0 auto; padding: 40px; }
  h1 {
    font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { color: var(--muted); font-size: 17px; margin-bottom: 32px; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    grid-auto-rows: 1fr;   /* equal-height rows so a timed tile's extra line doesn't make it taller */
    gap: 14px;
  }
  .tile {
    background: var(--card); border-radius: 14px; padding: 18px;
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text); text-decoration: none;
    display: flex; flex-direction: column; gap: 8px;
    transition: all 0.15s; position: relative; overflow: hidden;
    min-height: 130px;
  }
  .tile.play   { border-color: rgba(0,212,255,0.35); }
  .tile.manual { border-color: rgba(255,0,170,0.30); }
  .tile.soon   { opacity: 0.4; pointer-events: none; border-style: dashed; }
  .tile.locked { opacity: 0.5; pointer-events: none; border-style: dashed; border-color: rgba(255,77,109,0.4); }
  .tile.locked .tile-tag { background: rgba(255,77,109,0.12); color: #ff4d6d; }
  .tile .lock-badge { position: absolute; top: 10px; left: 12px; font-size: 18px; }
  .tile .timer-line {           /* in-flow pill — never overlaps the emoji or the ✓, shows even after submit */
    align-self: flex-start;
    font-size: 12px; font-weight: 800; color: var(--accent);
    background: rgba(0,212,255,0.12); padding: 2px 8px; border-radius: 999px;
  }
  .tile.timed { cursor: pointer; }

  .tw-box {
    background: var(--card); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px; padding: 26px; width: min(440px, 92vw); text-align: center;
    color: var(--text); margin: auto;   /* center: the global `* { margin: 0 }` reset kills the UA dialog centering */
  }
  .tw-box::backdrop { background: rgba(0,0,0,0.6); }
  .tw-box h2 { font-size: 20px; margin-bottom: 12px; }
  .tw-box p { color: var(--muted); line-height: 1.6; margin-bottom: 20px; font-size: 15px; }
  .tw-box strong { color: var(--text); }
  .tw-actions { display: flex; gap: 10px; justify-content: center; }
  .tw-actions button {
    background: var(--card); border: 1px solid rgba(255,255,255,0.12); color: var(--text);
    padding: 12px 18px; border-radius: 10px; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .tw-actions button.go { background: linear-gradient(135deg, var(--accent), #0099cc); border: none; color: #001; }
  .tile:not(.soon):hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
  }
  .tile-emoji { font-size: 28px; }
  .tile h3 { font-size: 17px; font-weight: 800; }
  .tile-tag {
    align-self: flex-start; margin-top: auto;
    font-size: 12px; font-weight: 700; padding: 3px 8px;
    border-radius: 999px; text-transform: uppercase; letter-spacing: 1px;
  }
  .tile.play   .tile-tag { background: rgba(0,212,255,0.12); color: var(--accent); }
  .tile.manual .tile-tag { background: rgba(255,0,170,0.12); color: var(--accent-2); }
  .tile.soon   .tile-tag { background: rgba(255,255,255,0.08); color: var(--muted); }
  .tile .check {
    position: absolute; top: 10px; right: 12px;
    color: var(--good); font-size: 18px; font-weight: 800;
    text-shadow: 0 0 10px rgba(0,230,118,0.6);
  }
  .tile .score-line {
    font-size: 13px; color: var(--muted);
  }
  .tile .score-line strong { color: var(--good); }
</style>
</head>
<body>
<main>
  <h1>Games</h1>
  <div class="subtitle" id="subtitle">Loading…</div>
  <div class="grid" id="grid"></div>
</main>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js';
import { firebaseConfig } from './firebase-config.js';
import { resolveSession } from './shared/lobby.js';
import { mountTopbar } from './shared/topbar.js';
import { GAMES } from './shared/games-catalog.js';
import { resolveLock } from './shared/game-lock.js';
import { resolveTimer } from './shared/game-config.js';

if (!firebaseConfig?.databaseURL || firebaseConfig.databaseURL.includes('REPLACE_ME')) {
  document.body.innerHTML = '<div style="max-width:640px;margin:80px auto;padding:32px;background:#1b2540;border-radius:16px;color:#f5f7fb;font-family:system-ui">Firebase config missing. See SETUP.md.</div>';
  throw new Error('firebase config not filled in');
}

const session = resolveSession();
if (!session) {
  location.replace('index.html');
  throw new Error('no session');
}
mountTopbar({ activePage: 'games' });

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const grid = document.getElementById('grid');
const subtitle = document.getElementById('subtitle');

let currentScores = null;
let currentLocks = null;
let currentTimers = null;

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function tileHref(key, g) {
  const q = `?lobby=${encodeURIComponent(session.lobbyId)}&team=${session.teamId}`;
  if (g.kind === 'play')   return `${g.href}${q}`;
  if (g.kind === 'manual') return `games/manual.html?key=${key}&lobby=${encodeURIComponent(session.lobbyId)}&team=${session.teamId}`;
  return null;
}

function render() {
  const scoresForTeam = currentScores;
  const html = Object.entries(GAMES).map(([key, g]) => {
    const lockedTile = g.kind !== 'soon' && resolveLock(currentLocks, key, session.teamId) === 'locked';
    const href = lockedTile ? null : tileHref(key, g);
    const baseTag = g.kind === 'play' ? 'Playable' : g.kind === 'manual' ? 'Manual entry' : 'Coming soon';
    const tag = lockedTile ? 'Locked' : baseTag;
    const score = scoresForTeam?.[key];
    const tick = score !== undefined ? '<div class="check" title="Submitted">✓</div>' : '';
    const scoreLine = score !== undefined
      ? `<div class="score-line">Score: <strong>${esc(String(score))}</strong></div>`
      : '';
    const lockBadge = lockedTile ? '<div class="lock-badge" title="Locked by host">🔒</div>' : '';
    const mins = g.kind === 'manual' ? resolveTimer(currentTimers, key, session.teamId) : undefined;
    const hasTimer = mins !== undefined;
    // Intercept ENTRY with a warning only for a fresh, unlocked, unsubmitted timed game.
    // The minute info itself shows whenever a timer is set (incl. after submit / when locked).
    const timed = hasTimer && !lockedTile && score === undefined;
    const timerInfo = hasTimer ? `<div class="timer-line" title="Time limit">⏱ ${mins} min limit</div>` : '';
    const tag2 = `<span class="tile-tag">${tag}</span>`;
    const tileCls = lockedTile ? `${g.kind} locked` : g.kind;
    const isDiv = g.kind === 'soon' || lockedTile || timed;
    const open = isDiv ? '<div' : '<a';
    const close = isDiv ? '</div>' : '</a>';
    // timed tiles carry the destination in data-href; a click handler shows the warning dialog.
    const hrefAttr = timed ? ` data-href="${href}" data-name="${esc(g.name)}" data-mins="${mins}"` : (href ? ` href="${href}"` : '');
    const tileCls2 = timed ? `${tileCls} timed` : tileCls;
    return `${open} class="tile ${tileCls2}"${hrefAttr}>
      <div class="tile-emoji">${g.emoji}</div>
      <h3>${esc(g.name)}</h3>
      ${scoreLine}
      ${timerInfo}
      ${tag2}
      ${tick}
      ${lockBadge}
    ${close}`;
  }).join('');
  grid.innerHTML = html;
  for (const el of grid.querySelectorAll('.tile.timed')) {
    el.addEventListener('click', () => openTimeWarning(el.dataset.href, el.dataset.name, el.dataset.mins));
  }

  const submitted = scoresForTeam ? Object.keys(scoresForTeam).length : 0;
  const total = Object.values(GAMES).filter(g => g.kind !== 'soon').length;
  subtitle.textContent = `Lobby ${session.lobbyId} · Team ${session.teamId} · ${submitted}/${total} games submitted`;
}

function openTimeWarning(href, name, mins) {
  const dialog = document.createElement('dialog');
  dialog.className = 'tw-box';
  dialog.innerHTML = `
    <h2>⏱ ${esc(name)} has a ${esc(mins)}-minute limit</h2>
    <p>Entering starts your countdown <strong>now</strong>. You must submit your score before it reaches 0, or you'll be recorded a <strong>0</strong>.</p>
    <div class="tw-actions">
      <button type="button" id="twCancel">Cancel</button>
      <button type="button" class="go" id="twGo">Enter game</button>
    </div>`;
  document.body.appendChild(dialog);
  dialog.addEventListener('close', () => dialog.remove());
  dialog.querySelector('#twCancel').addEventListener('click', () => dialog.close());
  dialog.querySelector('#twGo').addEventListener('click', () => { location.href = href; });
  dialog.addEventListener('click', e => { if (e.target === dialog) dialog.close(); }); // backdrop click cancels
  dialog.showModal();
}

onValue(ref(db, `lobbies/${session.lobbyId}/scores/${session.teamId}`), snap => {
  currentScores = snap.exists() ? snap.val() : null;
  render();
});

onValue(ref(db, `lobbies/${session.lobbyId}/locks`), snap => {
  currentLocks = snap.exists() ? snap.val() : null;
  render();
});

onValue(ref(db, `lobbies/${session.lobbyId}/timers`), snap => {
  currentTimers = snap.exists() ? snap.val() : null;
  render();
});
</script>
</body>
</html>
