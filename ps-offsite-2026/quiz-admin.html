<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS Offsite 2026 — Quiz</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <script>(function(){try{var t=localStorage.getItem('ps-theme')||(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="./shared/topbar.css">
<link rel="stylesheet" href="./shared/modal.css">
<style>
  :root {
    --bg: #09090C; --bg-2: #18181B; --card: #222224; --card-hover: #3A3A3D;
    --text: #FFFFFF; --muted: #848486;
    --accent: #DAFE85; --accent-2: #657BC7; --good: #00e676; --bad: #ff4d6d; --gold: #ffd84d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, var(--bg-2) 0%, var(--bg) 60%);
    color: var(--text); min-height: 100vh;
  }
  main { max-width: 900px; margin: 0 auto; padding: 40px; }
  h1 {
    font-size: 32px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { color: var(--muted); font-size: 16px; margin-bottom: 28px; }
  h2 { font-size: 22px; font-weight: 800; margin: 28px 0 14px; }
  .muted { color: var(--muted); }
  section { margin-bottom: 16px; }
  .cats { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .cat-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px;
  }
  .cat { display: flex; flex-direction: column; gap: 8px; }
  .qchips { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; padding: 0 4px 4px; }
  .qchips-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; }
  .qchip {
    background: var(--bg-2); border: 1px solid var(--border); color: var(--muted);
    border-radius: 999px; padding: 4px 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .qchip.on { background: rgba(255,216,77,0.16); border-color: rgba(255,216,77,0.55); color: var(--gold); }
  .cat-row .cat-name {
    flex: 1; background: var(--bg-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: 16px; font-weight: 700; font-family: inherit;
  }
  .qcount { display: flex; align-items: center; gap: 8px; }
  .qcount .qnum { min-width: 26px; text-align: center; font-weight: 800; font-size: 18px; }
  .qcount button, .cat-remove, .primary {
    background: var(--bg-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; font-size: 18px; font-weight: 800; cursor: pointer; font-family: inherit;
    width: 36px; height: 36px;
  }
  .cat-remove { color: var(--bad); }
  .primary {
    width: auto; height: auto; padding: 12px 18px; font-size: 16px;
    background: linear-gradient(135deg, var(--accent), #657BC7); color: var(--btn-on-accent); border: none;
  }
  .cat-block {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 18px; margin-bottom: 14px;
  }
  .cat-block h3 { font-size: 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .cat-check {
    font-size: 13px; font-weight: 800; color: var(--good);
    background: rgba(0,230,118,0.12); padding: 4px 10px; border-radius: 999px;
    white-space: nowrap; flex: 0 0 auto;
  }
  .cat-block.graded { border-color: rgba(0,230,118,0.3); }
  .q-block { margin-bottom: 12px; }
  .q-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 4px; }
  .sub-row { display: flex; gap: 12px; padding: 4px 0; font-size: 15px; border-bottom: 1px solid var(--border); }
  .sub-row .team { min-width: 120px; color: var(--accent); font-weight: 700; }
  .sub-row .ans { flex: 1; }
  .sub-row .ans.empty { color: var(--muted); }
  .sub-bonus .team { color: var(--gold); }
  .sub-row .ans.bonus-ans { color: var(--gold); }
  .bonus-row { color: var(--gold); font-weight: 800; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; margin: 2px 0 6px; }
  .sub-row .mark {
    margin-left: auto; width: 34px; height: 30px; flex: 0 0 auto;
    background: var(--bg-2); border: 1px solid var(--border); color: var(--bad);
    border-radius: 8px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit;
  }
  .sub-row .mark.ok { background: rgba(0,230,118,0.16); border-color: rgba(0,230,118,0.5); color: var(--good); }
  .grade-actions { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
  .grade-status { font-size: 14px; }
  .grade-status.good { color: var(--good); }
  .grade-status.bad { color: var(--bad); }

  .page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .head-actions { display: flex; gap: 8px; flex: 0 0 auto; }
  .head-actions button { white-space: nowrap; }
  .btn-ghost {
    background: var(--bg-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 10px 16px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .btn-danger {
    background: var(--card); border: 1px solid var(--border); color: var(--bad);
    border-radius: 10px; padding: 10px 18px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .btn-danger:hover { background: var(--card-hover); transform: translateY(-1px); }
</style>
</head>
<body>
<main>
  <div class="page-head">
    <h1>Quiz</h1>
    <div class="head-actions" id="headActions"></div>
  </div>
  <div class="subtitle" id="subtitle">Loading…</div>
  <section id="catEditor"></section>
  <section id="submissionsView"></section>
</main>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
import { getDatabase, ref, get, set, update, push, onValue } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js';
import { firebaseConfig } from './firebase-config.js';
import { mountTopbar } from './shared/topbar.js';
import { requireAdmin } from './shared/admin-gate.js';
import { getSession, isAdminSession } from './shared/lobby.js';
import { orderedCategories, nextOrder, teamQuizScore, seedCategories, DEFAULT_QUESTION_COUNT } from './shared/quiz.js';
import { submitScore, firebaseWriter } from './shared/score-submit.js';
import { openModal } from './shared/modal.js';

const lobbyId = new URLSearchParams(location.search).get('lobby');
if (!lobbyId) { location.replace('index.html'); throw new Error('no lobby in url'); }

if (!firebaseConfig?.databaseURL || firebaseConfig.databaseURL.includes('REPLACE_ME')) {
  document.body.innerHTML = '<div style="max-width:640px;margin:80px auto;padding:32px;background:var(--card);border-radius:16px;color:var(--text);font-family:system-ui">Firebase config missing. See SETUP.md.</div>';
  throw new Error('firebase config not filled in');
}

mountTopbar({ activePage: 'quiz-admin' });

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const LOBBY = `lobbies/${lobbyId}`;

const session = getSession();
const isAdmin = isAdminSession(session) && session.lobbyId === lobbyId;

let categories = null, submissions = null, teams = [], grades = null, gradedFlags = null;
const pending = {};               // pending[teamId][catId][idx] = { q:bool, b:bool }
const gradeStatus = {};           // gradeStatus[catId] = { cls, text } — survives re-renders
const submitting = new Set();     // catIds with an in-flight submit (keeps button disabled)
const gradedCats = new Set();     // catIds submitted this session (✓ + "Resubmit")
const writer = firebaseWriter({ db, ref, update, push });

// Category editor is buffered: every name/count/bonus/add/remove edit mutates a
// local clone (draftCats) and nothing hits the DB until Save. Cancel drops the
// clone and falls back to the live `categories` node. tmpSeq mints local-only
// keys for added categories (they have no submissions yet, so the key is free).
let draftCats = null, dirtyCats = false, tmpSeq = 0;
function catSource() { return dirtyCats ? draftCats : categories; }
function ensureDraft() {
  if (!dirtyCats) { draftCats = categories ? JSON.parse(JSON.stringify(categories)) : {}; dirtyCats = true; }
  return draftCats;
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderCatEditor() {
  const el = document.getElementById('catEditor');
  if (!isAdmin) { el.innerHTML = ''; return; }
  // A live categories echo must not rebuild the editor while the admin is
  // mid-typing a name (it would discard the in-progress text + drop focus).
  // The blur-triggered 'change' handler still commits the edit.
  if (el.contains(document.activeElement) && document.activeElement.classList.contains('cat-name')) return;
  const ordered = orderedCategories(catSource());
  el.innerHTML = `
    <h2>Categories</h2>
    <div class="cats">
      ${ordered.map(c => `
        <div class="cat" data-id="${c.id}">
          <div class="cat-row">
            <input class="cat-name" type="text" value="${esc(c.name)}" />
            <div class="qcount">
              <button class="qminus" title="Fewer questions">−</button>
              <span class="qnum">${c.questionCount}</span>
              <button class="qplus" title="More questions">+</button>
            </div>
            <button class="cat-remove" title="Remove category">✕</button>
          </div>
          <div class="qchips">
            <span class="qchips-label">Bonus:</span>
            ${Array.from({ length: c.questionCount || 0 }, (_, i) =>
              `<button class="qchip ${c.bonus?.[i] ? 'on' : ''}" data-idx="${i}" title="Toggle bonus for question ${i + 1}">Q${i + 1}</button>`
            ).join('')}
          </div>
        </div>`).join('')}
    </div>
    <button id="addCat" class="primary">+ Add category</button>`;
  for (const catEl of el.querySelectorAll('.cat')) {
    const id = catEl.dataset.id;
    catEl.querySelector('.cat-name').addEventListener('change', e => changeName(id, e.target.value));
    catEl.querySelector('.qplus').addEventListener('click', () => changeCount(id, +1));
    catEl.querySelector('.qminus').addEventListener('click', () => changeCount(id, -1));
    catEl.querySelector('.cat-remove').addEventListener('click', () => removeCat(id));
    for (const chip of catEl.querySelectorAll('.qchip')) {
      chip.addEventListener('click', () => toggleBonus(id, Number(chip.dataset.idx)));
    }
  }
  el.querySelector('#addCat').addEventListener('click', addCat);
}

// --- Buffered editor mutations: local draft only, no DB writes until Save. ---
function changeName(id, val) {
  const d = ensureDraft();
  if (d[id]) d[id].name = val.trim() || 'Category';
  renderHeadActions();
}
function changeCount(id, delta) {
  const d = ensureDraft();
  if (!d[id]) return;
  const next = Math.max(1, (d[id].questionCount || 0) + delta);
  d[id].questionCount = next;
  if (delta < 0 && d[id].bonus) {
    for (const k of Object.keys(d[id].bonus)) if (Number(k) >= next) delete d[id].bonus[k];
  }
  renderCatEditor(); renderHeadActions();
}
function toggleBonus(id, idx) {
  const d = ensureDraft();
  if (!d[id]) return;
  d[id].bonus ??= {};
  if (d[id].bonus[idx]) delete d[id].bonus[idx]; else d[id].bonus[idx] = true;
  renderCatEditor(); renderHeadActions();
}
function removeCat(id) {
  const d = ensureDraft();
  delete d[id];
  renderCatEditor(); renderHeadActions();
}
function addCat() {
  const d = ensureDraft();
  const order = nextOrder(d);
  d[`tmp_${tmpSeq++}`] = { order, name: `Category ${order + 1}`, questionCount: DEFAULT_QUESTION_COUNT };
  renderCatEditor(); renderHeadActions();
}

// Save commits the whole categories node at once (replacing it). Cancel drops
// the draft. Both reset dirty state and re-render from the live node.
async function saveCats() {
  if (!dirtyCats) return;
  await set(ref(db, `${LOBBY}/quiz/categories`), draftCats);
  dirtyCats = false; draftCats = null;
  renderAll();
}
function cancelCats() {
  dirtyCats = false; draftCats = null;
  renderAll();
}

// Seed local marks from saved grades — ONCE per cell. Never re-hydrate a cell
// the admin has already touched, so a live grades echo can't wipe edits.
function seedPending() {
  const g = grades || {};
  for (const teamId of Object.keys(g)) {
    for (const catId of Object.keys(g[teamId] || {})) {
      const marks = g[teamId][catId] || {};
      pending[teamId] ??= {};
      pending[teamId][catId] ??= {};
      for (const idx of Object.keys(marks)) {
        if (!(idx in pending[teamId][catId])) {
          const m = marks[idx] || {};
          pending[teamId][catId][idx] = { q: !!m.q, b: !!m.b };
        }
      }
    }
  }
}
function getMark(teamId, catId, idx) {
  return pending[teamId]?.[catId]?.[idx] || { q: false, b: false };
}
function toggleMark(teamId, catId, idx, field) {
  pending[teamId] ??= {};
  pending[teamId][catId] ??= {};
  const cur = pending[teamId][catId][idx] || { q: false, b: false };
  cur[field] = !cur[field];
  pending[teamId][catId][idx] = cur;
}

// A category counts as "graded" if it was submitted this session, has a
// persisted graded flag, or any team has saved grades for it (so the ✓ survives
// a reload even when the category scored zero correct answers).
function isCategoryGraded(catId) {
  if (gradedCats.has(catId)) return true;
  if (gradedFlags?.[catId]) return true;
  const g = grades || {};
  for (const tid of Object.keys(g)) if (g[tid] && g[tid][catId]) return true;
  return false;
}

function renderSubmissions() {
  const el = document.getElementById('submissionsView');
  const ordered = orderedCategories(categories);
  if (ordered.length === 0) {
    el.innerHTML = `<h2>Grading</h2><p class="muted">No categories yet.</p>`;
    return;
  }
  el.innerHTML = `<h2>Grading</h2>` + ordered.map(c => {
    const n = c.questionCount || 0;
    let qhtml = '';
    for (let i = 0; i < n; i++) {
      const isBonus = !!c.bonus?.[i];
      const rows = teams.map(t => {
        const sub = submissions?.[t.id]?.[c.id];
        const submitted = !!sub;
        const a = sub?.answers?.[i];
        const text = submitted ? (a && a.length ? esc(a) : '(blank)') : '—';
        const mark = getMark(t.id, c.id, i);
        const toggle = submitted
          ? `<button class="mark ${mark.q ? 'ok' : ''}" data-team="${t.id}" data-cat="${c.id}" data-idx="${i}" data-field="q">${mark.q ? '✓' : '✗'}</button>`
          : '';
        let html = `<div class="sub-row"><span class="team">${esc(t.name)}</span><span class="ans ${a && a.length ? '' : 'empty'}">${text}</span>${toggle}</div>`;
        if (isBonus) {
          const b = sub?.bonusAnswers?.[i];
          const btext = submitted ? (b && b.length ? esc(b) : '(blank)') : '—';
          const bToggle = submitted
            ? `<button class="mark ${mark.b ? 'ok' : ''}" data-team="${t.id}" data-cat="${c.id}" data-idx="${i}" data-field="b">${mark.b ? '✓' : '✗'}</button>`
            : '';
          html += `<div class="sub-row sub-bonus"><span class="team">↳ Bonus</span><span class="ans bonus-ans ${b && b.length ? '' : 'empty'}">${btext}</span>${bToggle}</div>`;
        }
        return html;
      }).join('');
      const bonusRow = isBonus ? `<div class="bonus-row">BONUS</div>` : '';
      qhtml += `<div class="q-block"><div class="q-title">Question ${i + 1}</div>${bonusRow}${rows}</div>`;
    }
    const body = qhtml || '<p class="muted">No questions.</p>';
    const gs = gradeStatus[c.id];
    const disabled = submitting.has(c.id) ? ' disabled' : '';
    const graded = isCategoryGraded(c.id);
    const check = graded ? '<span class="cat-check" title="Graded">✓ Submitted</span>' : '';
    const btnLabel = graded ? 'Resubmit' : 'Submit category';
    return `<div class="cat-block${graded ? ' graded' : ''}" data-cat="${c.id}">
      <h3>${esc(c.name)}${check}</h3>${body}
      <div class="grade-actions"><button class="primary submit-cat" data-cat="${c.id}"${disabled}>${btnLabel}</button><span class="grade-status ${gs ? gs.cls : 'muted'}" data-cat="${c.id}">${gs ? esc(gs.text) : ''}</span></div>
    </div>`;
  }).join('');

  for (const btn of el.querySelectorAll('.mark')) {
    btn.addEventListener('click', () => {
      toggleMark(btn.dataset.team, btn.dataset.cat, Number(btn.dataset.idx), btn.dataset.field);
      const on = getMark(btn.dataset.team, btn.dataset.cat, Number(btn.dataset.idx))[btn.dataset.field];
      btn.classList.toggle('ok', on);
      btn.textContent = on ? '✓' : '✗';
    });
  }
  for (const btn of el.querySelectorAll('.submit-cat')) {
    btn.addEventListener('click', () => submitCategoryGrades(btn.dataset.cat));
  }
}

// Build the saved grade node for one team+category from LOCAL pending marks.
// Bonus is an extra point: b is only recorded when the base (q) is also correct
// and the index is flagged bonus. Returns {} when nothing is correct.
function buildGradeNode(cat, teamId) {
  const n = cat.questionCount || 0;
  const node = {};
  for (let i = 0; i < n; i++) {
    const m = getMark(teamId, cat.id, i);
    const entry = {};
    if (m.q) entry.q = true;
    if (cat.bonus?.[i] && m.q && m.b) entry.b = true;
    if (Object.keys(entry).length) node[i] = entry;
  }
  return node;
}

// Persist marks for one category (all teams that submitted it), then recompute
// + publish each affected team's PQ total. The recompute reads each team's
// grades FRESH (one-shot get) so a sibling category saved moments earlier — by
// this admin or another — is never missed, then overlays the just-built node
// for this category. Writes are sequential and NOT atomic across teams; on a
// mid-loop failure the status reports how many teams were saved.
// Status is written into gradeStatus[catId] (not a captured DOM node), because
// the grades write below triggers a live onValue echo that rebuilds the whole
// submissions view mid-flight — any DOM ref grabbed here is detached before the
// final message lands. renderSubmissions re-renders the stored status + disabled
// state, so feedback survives the rebuild.
async function submitCategoryGrades(catId) {
  const cat = (categories || {})[catId];
  if (!cat) return;
  const catObj = { ...cat, id: catId };
  submitting.add(catId);
  setGradeStatus(catId, 'muted', 'Saving…');
  const affected = teams.filter(t => submissions?.[t.id]?.[catId]);
  let saved = 0, updated = 0;
  try {
    for (const t of affected) {
      const node = buildGradeNode(catObj, t.id);
      const hasMarks = Object.keys(node).length > 0;
      await set(ref(db, `${LOBBY}/quiz/grades/${t.id}/${catId}`), hasMarks ? node : null);
      saved++;

      // Recompute full total from a FRESH grades read (other categories) with
      // this category's freshly-built node overlaid.
      const snap = await get(ref(db, `${LOBBY}/quiz/grades/${t.id}`));
      const teamGrades = snap.exists() ? snap.val() : {};
      if (hasMarks) teamGrades[catId] = node; else delete teamGrades[catId];
      const total = teamQuizScore(teamGrades, categories);

      // No-op guard: only write PQ (and push history) when the total changed.
      const cur = await get(ref(db, `${LOBBY}/scores/${t.id}/PQ`));
      const prev = cur.exists() ? cur.val() : null;
      if (prev !== total) {
        await submitScore({ writer, lobbyId, teamId: t.id, gameKey: 'PQ', score: total });
        updated++;
      }
    }
    // Persisted marker: the scoreboard reads quiz/graded/{catId} to know the
    // quiz is only "closed" once every category has been graded.
    await set(ref(db, `${LOBBY}/quiz/graded/${catId}`), true);
    gradedCats.add(catId);
    const tail = updated > 0
      ? `${updated} score${updated === 1 ? '' : 's'} updated`
      : 'scores already up to date';
    setGradeStatus(catId, 'good', `Graded · ${affected.length} teams · ${tail}`);
    renderSubmissions();   // repaint ✓ header + "Resubmit" label
  } catch (e) {
    setGradeStatus(catId, 'bad', `Save failed after ${saved}/${affected.length} teams: ` + (e.message || 'unknown error'));
  } finally {
    submitting.delete(catId);
    const btn = document.querySelector(`.submit-cat[data-cat="${catId}"]`);
    if (btn) btn.disabled = false;
  }
}

// Persist + paint a category's grade status so it survives re-renders.
function setGradeStatus(catId, cls, text) {
  gradeStatus[catId] = { cls, text };
  const el = document.querySelector(`.grade-status[data-cat="${catId}"]`);
  if (el) { el.className = `grade-status ${cls}`; el.textContent = text; }
}

// Reset the Pub Quiz back to lobby-creation defaults: reseed categories (which
// wipes submissions + grades, both children of the quiz node) and clear every
// team's published PQ score so the scoreboard drops the column.
async function resetQuiz() {
  dirtyCats = false; draftCats = null;   // drop any buffered editor edits
  await set(ref(db, `${LOBBY}/quiz`), { categories: seedCategories() });
  for (const t of teams) await set(ref(db, `${LOBBY}/scores/${t.id}/PQ`), null);
  for (const k of Object.keys(pending)) delete pending[k];
}

function renderHeadActions() {
  const el = document.getElementById('headActions');
  if (!isAdmin) { el.innerHTML = ''; return; }
  const editBtns = dirtyCats
    ? `<button class="btn-ghost" id="cancelCats">Cancel</button><button class="primary" id="saveCats">Save</button>`
    : '';
  el.innerHTML = `${editBtns}<button class="btn-danger" id="resetQuiz">Reset</button>`;
  if (dirtyCats) {
    el.querySelector('#cancelCats').addEventListener('click', cancelCats);
    el.querySelector('#saveCats').addEventListener('click', saveCats);
  }
  el.querySelector('#resetQuiz').addEventListener('click', () => {
    openModal({
      title: '⚠️ Reset quiz',
      bodyHtml: `<p>Reset the Pub Quiz to the lobby default state (4 categories, 8 questions each)? This clears all categories, team answers, grades, and published Pub Quiz scores. This cannot be undone.</p>`,
      confirmLabel: 'Reset quiz',
      danger: true,
      onConfirm: resetQuiz,
    });
  });
}

function renderAll() {
  document.getElementById('subtitle').textContent =
    `${orderedCategories(catSource()).length} categories · ${teams.length} teams`;
  renderCatEditor();
  renderSubmissions();
  renderHeadActions();
}

(async () => {
  if (!await requireAdmin(lobbyId)) {
    document.body.innerHTML = `
      <div style="max-width:560px;margin:80px auto;padding:32px;background:var(--card);border-radius:16px;border:1px solid var(--border);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.6;text-align:center">
        <div style="font-size:48px;margin-bottom:12px">🔒</div>
        <h1 style="font-size:24px;margin-bottom:12px">Admins only</h1>
        <p style="color:#848486">This page manages the Pub Quiz. Enter the host password to continue.</p>
      </div>`;
    return;
  }
  onValue(ref(db, `${LOBBY}/teams`), snap => {
    const obj = snap.exists() ? snap.val() : {};
    teams = Object.values(obj).filter(Boolean).map(t => ({ id: t.id, name: t.name })).sort((a, b) => a.id - b.id);
    renderAll();
  });
  onValue(ref(db, `${LOBBY}/quiz/categories`), snap => {
    categories = snap.exists() ? snap.val() : null; renderAll();
  });
  onValue(ref(db, `${LOBBY}/quiz/submissions`), snap => {
    submissions = snap.exists() ? snap.val() : null; renderSubmissions();
  });
  onValue(ref(db, `${LOBBY}/quiz/grades`), snap => {
    grades = snap.exists() ? snap.val() : null; seedPending(); renderSubmissions();
  });
  onValue(ref(db, `${LOBBY}/quiz/graded`), snap => {
    gradedFlags = snap.exists() ? snap.val() : null; renderSubmissions();
  });
})();
</script>
</body>
</html>
