<!-- ps-offsite-2026/quiz-admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS Offsite 2026 — Quiz Admin</title>
<link rel="stylesheet" href="./shared/topbar.css">
<style>
  :root {
    --bg: #0a0e1a; --bg-2: #131a2e; --card: #1b2540;
    --text: #f5f7fb; --muted: #8b95b5;
    --accent: #00d4ff; --accent-2: #ff00aa; --good: #00e676; --bad: #ff4d6d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1f2a4a 0%, var(--bg) 60%);
    color: var(--text); min-height: 100vh;
  }
  main { max-width: 900px; margin: 0 auto; padding: 40px; }
  h1 {
    font-size: 32px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { color: var(--muted); font-size: 16px; margin-bottom: 28px; }
  h2 { font-size: 22px; font-weight: 800; margin: 28px 0 14px; }
  .muted { color: var(--muted); }
  section { margin-bottom: 16px; }
  .cats { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .cat-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; padding: 12px 14px;
  }
  .cat-row .cat-name {
    flex: 1; background: var(--bg-2); color: var(--text);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    padding: 10px 12px; font-size: 16px; font-weight: 700; font-family: inherit;
  }
  .qcount { display: flex; align-items: center; gap: 8px; }
  .qcount .qnum { min-width: 26px; text-align: center; font-weight: 800; font-size: 18px; }
  .qcount button, .cat-remove, .primary {
    background: var(--bg-2); border: 1px solid rgba(255,255,255,0.12); color: var(--text);
    border-radius: 8px; font-size: 18px; font-weight: 800; cursor: pointer; font-family: inherit;
    width: 36px; height: 36px;
  }
  .cat-remove { color: var(--bad); }
  .primary {
    width: auto; height: auto; padding: 12px 18px; font-size: 16px;
    background: linear-gradient(135deg, var(--accent), #0099cc); color: #001; border: none;
  }
  .cat-block {
    background: var(--card); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; padding: 16px 18px; margin-bottom: 14px;
  }
  .cat-block h3 { font-size: 18px; margin-bottom: 10px; }
  .q-block { margin-bottom: 12px; }
  .q-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 4px; }
  .sub-row { display: flex; gap: 12px; padding: 4px 0; font-size: 15px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .sub-row .team { min-width: 120px; color: var(--accent); font-weight: 700; }
  .sub-row .ans { flex: 1; }
  .sub-row .ans.empty { color: var(--muted); }
</style>
</head>
<body>
<main>
  <h1>Quiz Admin</h1>
  <div class="subtitle" id="subtitle">Loading…</div>
  <section id="catEditor"></section>
  <section id="submissionsView"></section>
</main>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
import { getDatabase, ref, set, push, onValue } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js';
import { firebaseConfig } from './firebase-config.js';
import { mountTopbar } from './shared/topbar.js';
import { requireAdmin } from './shared/admin-gate.js';
import { getSession, isAdminSession } from './shared/lobby.js';
import { orderedCategories, nextOrder } from './shared/quiz.js';

const lobbyId = new URLSearchParams(location.search).get('lobby');
if (!lobbyId) { location.replace('index.html'); throw new Error('no lobby in url'); }

if (!firebaseConfig?.databaseURL || firebaseConfig.databaseURL.includes('REPLACE_ME')) {
  document.body.innerHTML = '<div style="max-width:640px;margin:80px auto;padding:32px;background:#1b2540;border-radius:16px;color:#f5f7fb;font-family:system-ui">Firebase config missing. See SETUP.md.</div>';
  throw new Error('firebase config not filled in');
}

mountTopbar({ activePage: 'quiz-admin' });

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const LOBBY = `lobbies/${lobbyId}`;

const session = getSession();
const isAdmin = isAdminSession(session) && session.lobbyId === lobbyId;

let categories = null, submissions = null, teams = [];

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderCatEditor() {
  const el = document.getElementById('catEditor');
  if (!isAdmin) { el.innerHTML = ''; return; }
  // A live categories echo must not rebuild the editor while the admin is
  // mid-typing a name (it would discard the in-progress text + drop focus).
  // The blur-triggered 'change' handler still commits the edit.
  if (el.contains(document.activeElement) && document.activeElement.classList.contains('cat-name')) return;
  const ordered = orderedCategories(categories);
  el.innerHTML = `
    <h2>Categories</h2>
    <div class="cats">
      ${ordered.map(c => `
        <div class="cat-row" data-id="${c.id}">
          <input class="cat-name" type="text" value="${esc(c.name)}" />
          <div class="qcount">
            <button class="qminus" title="Fewer questions">−</button>
            <span class="qnum">${c.questionCount}</span>
            <button class="qplus" title="More questions">+</button>
          </div>
          <button class="cat-remove" title="Remove category">✕</button>
        </div>`).join('')}
    </div>
    <button id="addCat" class="primary">+ Add category</button>`;
  for (const row of el.querySelectorAll('.cat-row')) {
    const id = row.dataset.id;
    row.querySelector('.cat-name').addEventListener('change', e => {
      set(ref(db, `${LOBBY}/quiz/categories/${id}/name`), e.target.value.trim() || 'Category');
    });
    row.querySelector('.qplus').addEventListener('click', () => changeCount(id, +1));
    row.querySelector('.qminus').addEventListener('click', () => changeCount(id, -1));
    row.querySelector('.cat-remove').addEventListener('click', () => removeCat(id));
  }
  el.querySelector('#addCat').addEventListener('click', addCat);
}

function curCount(id) {
  const c = (categories || {})[id];
  return c ? (c.questionCount || 0) : 0;
}
async function changeCount(id, delta) {
  const next = Math.max(1, curCount(id) + delta);
  await set(ref(db, `${LOBBY}/quiz/categories/${id}/questionCount`), next);
}
async function removeCat(id) {
  if (!confirm('Remove this category? Existing team submissions for it stay in the database but are hidden here.')) return;
  await set(ref(db, `${LOBBY}/quiz/categories/${id}`), null);
}
async function addCat() {
  const order = nextOrder(categories);
  await push(ref(db, `${LOBBY}/quiz/categories`), {
    order, name: `Category ${order + 1}`, questionCount: 8,
  });
}

function renderSubmissions() {
  const el = document.getElementById('submissionsView');
  const ordered = orderedCategories(categories);
  if (ordered.length === 0) {
    el.innerHTML = `<h2>Submissions</h2><p class="muted">No categories yet.</p>`;
    return;
  }
  el.innerHTML = `<h2>Submissions</h2>` + ordered.map(c => {
    const n = c.questionCount || 0;
    let qhtml = '';
    for (let i = 0; i < n; i++) {
      const rows = teams.map(t => {
        const sub = submissions?.[t.id]?.[c.id];
        const submitted = !!sub;
        const a = sub?.answers?.[i];
        const text = submitted ? (a && a.length ? esc(a) : '(blank)') : '—';
        return `<div class="sub-row"><span class="team">${esc(t.name)}</span><span class="ans ${a && a.length ? '' : 'empty'}">${text}</span></div>`;
      }).join('');
      qhtml += `<div class="q-block"><div class="q-title">Question ${i + 1}</div>${rows}</div>`;
    }
    return `<div class="cat-block"><h3>${esc(c.name)}</h3>${qhtml || '<p class="muted">No questions.</p>'}</div>`;
  }).join('');
}

function renderAll() {
  document.getElementById('subtitle').textContent =
    `Lobby ${lobbyId} · ${orderedCategories(categories).length} categories · ${teams.length} teams`;
  renderCatEditor();
  renderSubmissions();
}

(async () => {
  if (!await requireAdmin(lobbyId)) {
    document.body.innerHTML = `
      <div style="max-width:560px;margin:80px auto;padding:32px;background:#1b2540;border-radius:16px;border:1px solid rgba(255,255,255,0.06);color:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.6;text-align:center">
        <div style="font-size:48px;margin-bottom:12px">🔒</div>
        <h1 style="font-size:24px;margin-bottom:12px">Admins only</h1>
        <p style="color:#8b95b5">This page manages the Pub Quiz. Enter the host password to continue.</p>
      </div>`;
    return;
  }
  onValue(ref(db, `${LOBBY}/teams`), snap => {
    const obj = snap.exists() ? snap.val() : {};
    teams = Object.values(obj).filter(Boolean).map(t => ({ id: t.id, name: t.name })).sort((a, b) => a.id - b.id);
    renderAll();
  });
  onValue(ref(db, `${LOBBY}/quiz/categories`), snap => {
    categories = snap.exists() ? snap.val() : null; renderAll();
  });
  onValue(ref(db, `${LOBBY}/quiz/submissions`), snap => {
    submissions = snap.exists() ? snap.val() : null; renderSubmissions();
  });
})();
</script>
</body>
</html>
