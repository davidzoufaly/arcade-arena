<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade Arena</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <script>(function(){try{var t=localStorage.getItem('ps-theme')||(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  :root {
    --bg: #09090C;
    --bg-2: #18181B;
    --card: #222224;
    --text: #FFFFFF;
    --muted: #848486;
    --accent: #DAFE85;
    --accent-2: #657BC7;
    --gold: #ffd84d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, var(--bg-2) 0%, var(--bg) 60%);
    color: var(--text); min-height: 100vh; padding: 40px;
  }
  main { max-width: 1100px; margin: 0 auto; }
  h1 {
    font-size: 42px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { color: var(--muted); font-size: 18px; margin-bottom: 40px; }

  .arcade-head { margin-bottom: 36px; }
  .arcade-head h1 { font-size: clamp(36px, 6vw, 54px); }
  @media (max-width: 640px) {
    body { padding: 20px; }
  }

  .mode-switch { display: flex; gap: 8px; margin-bottom: 14px; }
  .mode-option {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    border: 1px solid var(--border, rgba(255,255,255,0.12));
    background: var(--bg-2); color: var(--muted);
    font-weight: 700; font-size: 14px; user-select: none;
    transition: border-color .12s, color .12s, background .12s;
  }
  .mode-option input { position: absolute; opacity: 0; pointer-events: none; }
  .mode-option:has(input:checked) {
    border-color: var(--accent); color: var(--text); background: var(--card);
  }
</style>
<link rel="stylesheet" href="shared/lobby.css">
</head>
<body>
<main>
  <div class="arcade-head">
    <h1>Arcade Arena</h1>
    <div class="subtitle">Create a lobby or join one to start playing.</div>
  </div>


  <!-- ============== VIEW: create-join ============== -->
  <section id="view-create-join" hidden>
    <div class="lobby-cards">
      <div class="lobby-card">
        <h2>Create lobby</h2>
        <label>Mode</label>
        <div class="mode-switch" id="modeSwitch">
          <label class="mode-option">
            <input type="radio" name="lobbyMode" value="teams" checked>
            <span>Teams</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="lobbyMode" value="individuals">
            <span>Individuals</span>
          </label>
        </div>
        <label for="createTeamCount" id="createCountLabel">Number of teams</label>
        <input id="createTeamCount" type="number" min="2" max="20" value="10">
        <div class="lobby-hint" id="createCountHint">2–20 teams. We recommend 2–6 players per team.</div>
        <button id="createBtn">Create lobby</button>
        <div id="createErr" class="lobby-banner err" hidden></div>
      </div>
      <div class="lobby-card">
        <h2>Join lobby</h2>
        <label for="joinLobbyId">Lobby ID</label>
        <input id="joinLobbyId" type="text" placeholder="XXXX" maxlength="4" autocomplete="off">
        <button id="joinContinueBtn">Continue</button>
        <div id="joinErr" class="lobby-banner err" hidden></div>
        <div id="teamPicker" hidden>
          <label>Pick your team</label>
          <div class="team-picker" id="teamPickerList"></div>
          <label for="joinTeamPwd" id="joinPwdLabel">Team password</label>
          <input id="joinTeamPwd" type="text" maxlength="12" autocomplete="off">
          <button id="joinFinalBtn">Join</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ============== VIEW: credentials ============== -->
  <section id="view-credentials" hidden>
    <div class="lobby-credentials">
      <div class="big">
        <div>
          <div style="font-size: 13px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Lobby ID</div>
          <div class="code" id="credLobbyId"></div>
        </div>
        <button class="copy-btn" data-copy="credLobbyId">Copy</button>
        <div style="margin-left:auto">
          <div style="font-size: 13px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Admin password</div>
          <div class="code" id="credAdminPwd"></div>
        </div>
        <button class="copy-btn" data-copy="credAdminPwd">Copy</button>
      </div>
      <table>
        <thead>
          <tr><th>#</th><th>Team</th><th>Password</th><th></th></tr>
        </thead>
        <tbody id="credTeamRows"></tbody>
      </table>
      <button class="continue" id="credContinueBtn">Continue → join lobby</button>
    </div>
  </section>

</main>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
import { getDatabase, ref, get, set } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js';
import { firebaseConfig } from './firebase-config.js';
import {
  createLobbyApi, isValidLobbyId,
  getSession, setSession, isAdminSession,
} from './shared/lobby.js';

if (!firebaseConfig?.databaseURL || firebaseConfig.databaseURL.includes('REPLACE_ME')) {
  document.body.innerHTML = '<div style="max-width:640px;margin:80px auto;padding:32px;background:var(--card);border-radius:16px;color:var(--text);font-family:system-ui">Firebase config missing. See SETUP.md.</div>';
  throw new Error('firebase config not filled in');
}

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Adapter wires Firebase into lobby API
const api = createLobbyApi({
  get: async (path) => {
    const snap = await get(ref(db, path));
    return snap.exists() ? snap.val() : null;
  },
  set: async (path, value) => set(ref(db, path), value),
});

const $ = id => document.getElementById(id);
function show(id) {
  for (const v of ['view-create-join', 'view-credentials']) {
    $(v).hidden = (v !== id);
  }
}
function showErr(id, msg) {
  const el = $(id);
  el.textContent = msg;
  el.hidden = false;
}
function hideErr(id) { $(id).hidden = true; }
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const LAST_LOBBY_KEY = 'arcade.lastLobbyId';
function rememberLobby(id) {
  try { localStorage.setItem(LAST_LOBBY_KEY, id); } catch {}
}
function recallLobby() {
  try { return localStorage.getItem(LAST_LOBBY_KEY) || ''; } catch { return ''; }
}

// ---------- create flow ----------
function selectedMode() {
  return document.querySelector('input[name="lobbyMode"]:checked')?.value === 'individuals'
    ? 'individuals' : 'teams';
}
function syncModeCopy() {
  const individuals = selectedMode() === 'individuals';
  $('createCountLabel').textContent = individuals ? 'Number of players' : 'Number of teams';
  $('createCountHint').textContent = individuals
    ? '2–20 players. Each plays solo.'
    : '2–20 teams. We recommend 2–6 players per team.';
}
$('modeSwitch').addEventListener('change', syncModeCopy);
syncModeCopy();

$('createBtn').addEventListener('click', async () => {
  hideErr('createErr');
  const mode = selectedMode();
  const noun = mode === 'individuals' ? 'Player' : 'Team';
  const n = parseInt($('createTeamCount').value, 10);
  if (!Number.isInteger(n) || n < 2 || n > 20) {
    showErr('createErr', `${noun} count must be 2–20.`);
    return;
  }
  $('createBtn').disabled = true;
  try {
    const { lobbyId, adminPwd, teams } = await api.createLobby(n, mode);
    rememberLobby(lobbyId);
    renderCredentials({ lobbyId, adminPwd, teams, mode });
    show('view-credentials');
  } catch (e) {
    showErr('createErr', e.message || 'Failed to create lobby.');
  } finally {
    $('createBtn').disabled = false;
  }
});

function renderCredentials({ lobbyId, adminPwd, teams, mode }) {
  const noun = mode === 'individuals' ? 'Player' : 'Team';
  const hdr = $('credTeamRows').closest('table')?.querySelector('thead th:nth-child(2)');
  if (hdr) hdr.textContent = noun;
  $('credLobbyId').textContent = lobbyId;
  $('credAdminPwd').textContent = adminPwd;
  const tbody = $('credTeamRows');
  tbody.innerHTML = teams.map(t => `
    <tr>
      <td>${t.id}</td>
      <td>${esc(t.name)}</td>
      <td><span class="code" id="cred-team-${t.id}">${esc(t.pwd)}</span></td>
      <td><button class="copy-btn" data-copy="cred-team-${t.id}">Copy</button></td>
    </tr>
  `).join('');
  $('credContinueBtn').onclick = () => {
    $('joinLobbyId').value = lobbyId;
    show('view-create-join');
    revealTeamPicker(lobbyId);
  };
  document.querySelectorAll('#view-credentials .copy-btn').forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.copy;
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).catch(() => {});
      const orig = btn.textContent;
      btn.textContent = '✓';
      setTimeout(() => { btn.textContent = orig; }, 1200);
    };
  });
}

// ---------- join flow ----------
$('joinLobbyId').addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase();
});

$('joinContinueBtn').addEventListener('click', async () => {
  hideErr('joinErr');
  const id = $('joinLobbyId').value.trim();
  if (!isValidLobbyId(id)) {
    showErr('joinErr', 'Lobby ID is 4 characters (uppercase, no 0/O/1/I).');
    return;
  }
  revealTeamPicker(id);
});

async function revealTeamPicker(lobbyId) {
  hideErr('joinErr');
  try {
    const teams = await api.loadLobbyTeams(lobbyId);
    if (!teams.length) {
      $('teamPicker').hidden = true;
      showErr('joinErr', 'Lobby has no teams yet.');
      return;
    }
    const list = $('teamPickerList');
    list.innerHTML = teams.map((t, i) => `
      <label class="team-option">
        <input type="radio" name="teamPick" value="${t.id}" ${i === 0 ? 'checked' : ''}>
        <span>${esc(t.name)}</span>
      </label>
    `).join('') + `
      <label class="team-option team-option-admin">
        <input type="radio" name="teamPick" value="__admin__">
        <span>Enter as Admin</span>
      </label>`;
    list.onchange = () => {
      const isAdmin = document.querySelector('input[name="teamPick"]:checked')?.value === '__admin__';
      $('joinPwdLabel').textContent = isAdmin ? 'Admin password' : 'Team password';
    };
    $('joinPwdLabel').textContent = 'Team password';
    $('teamPicker').hidden = false;
    $('joinFinalBtn').onclick = () => doJoin(lobbyId);
  } catch (e) {
    if (e.code === 'NOT_FOUND') showErr('joinErr', 'Lobby not found. Check the ID.');
    else showErr('joinErr', e.message || 'Failed to load lobby.');
    $('teamPicker').hidden = true;
  }
}

async function doJoin(lobbyId) {
  hideErr('joinErr');
  const radio = document.querySelector('input[name="teamPick"]:checked');
  if (!radio) { showErr('joinErr', 'Pick a team.'); return; }
  const pwd = $('joinTeamPwd').value.trim().toUpperCase();
  if (!pwd) { showErr('joinErr', 'Enter password.'); return; }
  if (radio.value === '__admin__') {
    const ok = await api.verifyAdminPwd(lobbyId, pwd);
    if (!ok) { showErr('joinErr', 'Wrong admin password.'); return; }
    rememberLobby(lobbyId);
    setSession({ lobbyId, role: 'admin' });
    location.href = `scoreboard.html?lobby=${encodeURIComponent(lobbyId)}`;
    return;
  }
  const teamId = parseInt(radio.value, 10);
  const ok = await api.verifyTeamPwd(lobbyId, teamId, pwd);
  if (!ok) { showErr('joinErr', 'Wrong password.'); return; }
  rememberLobby(lobbyId);
  setSession({ lobbyId, teamId });
  location.href = `games.html?lobby=${encodeURIComponent(lobbyId)}&team=${teamId}`;
}

// ---------- bootstrap ----------
const session = getSession();
if (session && isAdminSession(session)) {
  location.replace(`scoreboard.html?lobby=${encodeURIComponent(session.lobbyId)}`);
} else if (session) {
  location.replace(`games.html?lobby=${encodeURIComponent(session.lobbyId)}&team=${session.teamId}`);
} else {
  show('view-create-join');
  // Prefill the join field from ?lobby=… (shared link) or the last lobby this device used.
  const urlLobby = new URLSearchParams(location.search).get('lobby');
  const prefill = (urlLobby || recallLobby() || '').toUpperCase();
  if (prefill) {
    $('joinLobbyId').value = prefill;
    if (isValidLobbyId(prefill)) revealTeamPicker(prefill);
  }
}
</script>
</body>
</html>
